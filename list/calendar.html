<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>قَبَس | تقویم شهدا</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Vazirmatn:wght@400;700;800&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --bg-header: #0a1a12; --bg-card: rgba(22, 38, 30, 0.7);
      --glass-border: rgba(201, 168, 76, 0.15); --gold: #c9a84c;
      --gold-light: #e2c87a; --text: #e8e6e0; --text-muted: #a4a098;
      --green: #4caf84; --red: #ff6b6b;
    }
    body {
      font-family: 'Vazirmatn', 'Segoe UI', Tahoma, sans-serif;
      background: radial-gradient(ellipse at top, #1d3528 0%, #0a1410 60%);
      color: var(--text); min-height: 100vh;
      direction: rtl; line-height: 1.7;
    }
    .header {
      background: var(--bg-header); border-bottom: 1px solid rgba(201,168,76,0.2);
      padding: 14px 20px; display: flex; align-items: center;
      justify-content: space-between; position: sticky; top: 0; z-index: 100;
    }
    .header-back { color: var(--gold); font-size: 14px; font-weight: 600; text-decoration: none; display: flex; align-items: center; gap: 4px; }
    .header-title {
      font-family: 'Vazirmatn', sans-serif; font-size: 1.4rem; font-weight: 800;
      background: linear-gradient(180deg, #f5dea3 0%, #c9a84c 50%, #8a6914 100%);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .container { max-width: 500px; margin: 0 auto; padding: 20px 16px; }

    .calendar-card {
      background: var(--bg-card); backdrop-filter: blur(16px);
      border: 1px solid var(--glass-border); border-radius: 16px;
      padding: 20px; margin-bottom: 15px;
    }
    .month-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
    .month-header button {
      background: rgba(34,54,44,0.9); border: 1px solid rgba(201,168,76,0.3);
      color: var(--gold); font-size: 1.2rem; cursor: pointer;
      width: 40px; height: 40px; border-radius: 10px; transition: all 0.3s;
      display: flex; align-items: center; justify-content: center;
    }
    .month-header button:hover { background: rgba(201,168,76,0.2); }
    .month-title { color: var(--gold); font-size: 1.3rem; font-weight: bold; }
    .days-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 6px; text-align: center; }
    .day {
      padding: 12px 4px; border-radius: 10px; cursor: pointer; transition: all 0.2s;
      font-size: 0.95rem; background: rgba(255,255,255,0.03); border: 1px solid transparent;
    }
    .day:hover { background: rgba(201,168,76,0.1); border-color: rgba(201,168,76,0.3); }
    .day.today { background: rgba(201,168,76,0.2); border: 1px solid var(--gold); font-weight: bold; }
    .day.has-birth { border-right: 3px solid var(--green); }
    .day.has-martyr { border-left: 3px solid var(--red); }
    .day.has-both { border-right: 3px solid var(--green); border-left: 3px solid var(--red); }

    .events-card {
      background: var(--bg-card); backdrop-filter: blur(16px);
      border: 1px solid var(--glass-border); border-radius: 16px;
      padding: 20px; display: none;
    }
    .events-card.show { display: block; animation: fadeIn 0.3s ease; }
    @keyframes fadeIn { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }
    .events-card h3 { color: var(--gold); margin-bottom: 10px; }
    .event-item { display: flex; align-items: center; gap: 10px; padding: 10px; background: rgba(255,255,255,0.02); border-radius: 8px; margin-bottom: 5px; }
    .event-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
    .event-name { color: var(--gold); font-weight: bold; font-size: 0.95rem; }
    .event-type { font-size: 0.75rem; }
    .no-event { text-align: center; color: var(--text-muted); padding: 15px; }
    .event-count { color: var(--gold); font-size: 0.8rem; margin-bottom: 8px; }

    .footer {
      background: var(--bg-header); border-top: 1px solid rgba(201,168,76,0.2);
      text-align: center; padding: 16px; margin-top: 20px;
    }
    .footer-text { font-size: 11px; color: var(--text-muted); }

    @media (max-width: 400px) { .day { padding: 10px 2px; font-size: 0.8rem; } }
  </style>
</head>
<body>

  <header class="header">
    <a href="../index.html" class="header-back"><i class="fa-solid fa-arrow-right"></i> بازگشت</a>
    <div class="header-title">تقویم شهدا</div>
    <div style="width:60px;"></div>
  </header>

  <div class="container">

    <div class="calendar-card">
      <div class="month-header">
        <button onclick="changeMonth(1)"><i class="fa-solid fa-chevron-right"></i></button>
        <span class="month-title" id="monthTitle"></span>
        <button onclick="changeMonth(-1)"><i class="fa-solid fa-chevron-left"></i></button>
      </div>
      <div class="days-grid" id="daysGrid"></div>
    </div>

    <div class="events-card" id="eventsCard">
      <h3 id="eventsDate"></h3>
      <div class="event-count" id="eventCount"></div>
      <div id="eventsList"></div>
    </div>

  </div>

  <footer class="footer">
    <p class="footer-text"><i class="fa-solid fa-fire"></i> قَبَس — شعله‌ای از نور شهدا</p>
  </footer>

  <script>
    var API_URL = 'https://script.google.com/macros/s/AKfycbzuhWUIJ_d0bfIctIwcsQ61ELOpYUDKLT1KU5zNci1OT4ie1g_3pd3sRZlVJJzCAXllnA/exec';
    var SHOHADA_API = API_URL + '?type=shohada_list';
    var shohadaList = [];

    fetch(SHOHADA_API)
      .then(function(r) { return r.json(); })
      .then(function(data) { shohadaList = data; renderCalendar(); })
      .catch(function() { renderCalendar(); });

    var monthNames = ['فروردین', 'اردیبهشت', 'خرداد', 'تیر', 'مرداد', 'شهریور', 'مهر', 'آبان', 'آذر', 'دی', 'بهمن', 'اسفند'];
    var today = new Date();
    var persianToday = gregorianToPersian(today);
    var currentYear = persianToday.year;
    var currentMonth = persianToday.month;

    function gregorianToPersian(g) {
      var gy = g.getFullYear(), gm = g.getMonth() + 1, gd = g.getDate();
      var gDays = [0,31,59,90,120,151,181,212,243,273,304,334];
      var gy2 = gm > 2 ? gy + 1 : gy;
      var days = 355666 + 365*gy + Math.floor((gy2+3)/4) - Math.floor((gy2+99)/100) + Math.floor((gy2+399)/400) + gd + gDays[gm-1];
      var jy = -1595 + 33*Math.floor(days/12053); days %= 12053;
      jy += 4*Math.floor(days/1461); days %= 1461;
      if (days > 365) { jy += Math.floor((days-1)/365); days = (days-1)%365; }
      var jm = days < 186 ? 1 + Math.floor(days/31) : 7 + Math.floor((days-186)/30);
      var jd = days < 186 ? 1 + days%31 : 1 + (days-186)%30;
      return { year: jy, month: jm, day: jd };
    }

    function getDaysInMonth(y, m) {
      if (m <= 6) return 31;
      if (m <= 11) return 30;
      var a = y + 621;
      return (a%4===0 && a%100!==0) || a%400===0 ? 30 : 29;
    }

    function parseDate(str) {
      if (!str) return { month: 0, day: 0 };
      var p = str.split('/');
      return { month: parseInt(p[1]) || 0, day: parseInt(p[2]) || 0 };
    }

    function getEvents(month, day) {
      var result = [];
      for (var i = 0; i < shohadaList.length; i++) {
        var s = shohadaList[i];
        var birth = parseDate(s.birth);
        var martyr = parseDate(s.martyrdom);
        if (birth.month === month && birth.day === day) result.push({ name: s.name, type: 'تولد', color: '#4caf84' });
        if (martyr.month === month && martyr.day === day) result.push({ name: s.name, type: 'شهادت', color: '#ff6b6b' });
      }
      return result;
    }

    function renderCalendar() {
      document.getElementById('monthTitle').textContent = monthNames[currentMonth-1] + ' ' + currentYear;
      var daysInMonth = getDaysInMonth(currentYear, currentMonth);
      var html = '';
      for (var d = 1; d <= daysInMonth; d++) {
        var events = getEvents(currentMonth, d);
        var cls = 'day';
        if (currentYear === persianToday.year && currentMonth === persianToday.month && d === persianToday.day) cls += ' today';
        var hasBirth = false, hasMartyr = false;
        for (var i = 0; i < events.length; i++) {
          if (events[i].type === 'تولد') hasBirth = true;
          if (events[i].type === 'شهادت') hasMartyr = true;
        }
        if (hasBirth && hasMartyr) cls += ' has-both';
        else if (hasBirth) cls += ' has-birth';
        else if (hasMartyr) cls += ' has-martyr';
        html += '<div class="' + cls + '" onclick="showEvents(' + d + ')">' + d + '</div>';
      }
      document.getElementById('daysGrid').innerHTML = html;
      document.getElementById('eventsCard').classList.remove('show');
    }

    function showEvents(day) {
      var events = getEvents(currentMonth, day);
      document.getElementById('eventsDate').innerHTML = day + ' ' + monthNames[currentMonth-1] + ' ' + currentYear;
      document.getElementById('eventCount').textContent = events.length > 0 ? events.length + ' مناسبت' : '';
      if (events.length === 0) {
        document.getElementById('eventsList').innerHTML = '<div class="no-event">مناسبت خاصی ثبت نشده</div>';
      } else {
        var html = '';
        for (var i = 0; i < events.length; i++) {
          html += '<div class="event-item"><div class="event-dot" style="background:' + events[i].color + '"></div><div><div class="event-name">' + events[i].name + '</div><div class="event-type" style="color:' + events[i].color + '">' + events[i].type + '</div></div></div>';
        }
        document.getElementById('eventsList').innerHTML = html;
      }
      document.getElementById('eventsCard').classList.add('show');
    }

    function changeMonth(delta) {
      currentMonth += delta;
      if (currentMonth > 12) { currentMonth = 1; currentYear++; }
      if (currentMonth < 1) { currentMonth = 12; currentYear--; }
      renderCalendar();
    }
  </script>
</body>
</html>
