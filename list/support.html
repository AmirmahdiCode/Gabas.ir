<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>قَبَس | پشتیبانی</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Vazirmatn:wght@400;700;800&display=swap');
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --bg-header: #0a1a12; --bg-card: rgba(22, 38, 30, 0.7);
      --glass-border: rgba(201, 168, 76, 0.15); --gold: #c9a84c;
      --gold-light: #e2c87a; --text: #e8e6e0; --text-muted: #a4a098;
      --bg-dark: #0a1410;
    }
    body {
      font-family: 'Vazirmatn', 'Segoe UI', Tahoma, sans-serif;
      background: radial-gradient(ellipse at top, #1d3528 0%, #0a1410 60%);
      color: var(--text); min-height: 100vh; direction: rtl; display: flex; flex-direction: column;
    }
    .header {
      background: var(--bg-header); border-bottom: 1px solid rgba(201,168,76,0.2);
      padding: 14px 20px; display: flex; align-items: center;
      justify-content: space-between; position: sticky; top: 0; z-index: 100;
    }
    .header-back { color: var(--gold); font-size: 14px; font-weight: 600; text-decoration: none; display: flex; align-items: center; gap: 4px; }
    .header-title {
      font-family: 'Vazirmatn', sans-serif; font-size: 1.2rem; font-weight: 800;
      background: linear-gradient(180deg, #f5dea3 0%, #c9a84c 50%, #8a6914 100%);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    }
    .chat-container { max-width: 650px; margin: 0 auto; padding: 16px; flex: 1; width: 100%; display: flex; flex-direction: column; }
    .chat-messages { flex: 1; overflow-y: auto; padding: 8px 0; display: flex; flex-direction: column; gap: 12px; }
    
    .msg { display: flex; gap: 10px; animation: fadeIn 0.3s ease; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    .msg.user { flex-direction: row-reverse; }
    .msg .avatar {
      width: 36px; height: 36px; border-radius: 50%; display: flex; align-items: center; justify-content: center;
      font-size: 14px; flex-shrink: 0;
    }
    .msg.bot .avatar { background: var(--gold); color: var(--bg-dark); box-shadow: 0 0 10px rgba(201,168,76,0.3); }
    .msg.user .avatar { background: #1f281f; color: var(--gold); border: 1.5px solid rgba(201,168,76,0.2); }
    
    .msg .bubble {
      max-width: 80%; padding: 12px 16px; border-radius: 12px;
      font-size: 13px; line-height: 1.6; word-break: break-word;
    }
    .msg.bot .bubble { background: var(--bg-card); backdrop-filter: blur(16px); border: 1px solid var(--glass-border); border-bottom-right-radius: 4px; color: var(--text); }
    .msg.user .bubble { background: rgba(201,168,76,0.12); border: 1px solid rgba(201,168,76,0.15); border-bottom-left-radius: 4px; color: var(--gold-light); }
    
    .chat-input-area {
      display: flex; gap: 8px; padding: 12px 0;
      background: linear-gradient(to top, rgba(10,26,18,0.95), transparent);
      position: sticky; bottom: 0;
    }
    .chat-input-area input {
      flex: 1; padding: 12px 16px; border: 1px solid var(--glass-border); border-radius: 24px;
      font-size: 13px; background: var(--bg-card); color: var(--text); outline: none; font-family: inherit;
    }
    .chat-input-area input::placeholder { color: var(--text-muted); }
    .chat-input-area input:focus { border-color: var(--gold); }
    .chat-input-area button {
      width: 42px; height: 42px; border-radius: 50%; border: none; background: var(--gold);
      color: var(--bg-dark); font-size: 16px; cursor: pointer; transition: all 0.3s; flex-shrink: 0;
    }
    .chat-input-area button:disabled { opacity: 0.5; cursor: not-allowed; }
    
    .typing { display: none; padding: 8px 16px; color: var(--gold); font-size: 12px; direction: ltr; }
    .typing i { margin: 0 2px; animation: bounce 0.6s infinite; color: var(--gold); }
    .typing i:nth-child(2) { animation-delay: 0.2s; }
    .typing i:nth-child(3) { animation-delay: 0.4s; }
    @keyframes bounce { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-5px)} }

    .footer { background: var(--bg-header); border-top: 1px solid rgba(201,168,76,0.2); text-align: center; padding: 16px; }
    .footer-text { font-size: 11px; color: var(--text-muted); }

    @media (max-width: 500px) { .chat-container { padding: 8px; } .msg .bubble { max-width: 85%; } }
  </style>
</head>
<body>
  <header class="header">
    <a href="../index.html" class="header-back"><i class="fa-solid fa-arrow-right"></i> بازگشت</a>
    <div class="header-title">پشتیبانی قَبَس</div>
    <div style="width:60px;"></div>
  </header>

  <div class="chat-container">
    <div class="chat-messages" id="chatMessages">
      <div class="msg bot">
        <div class="avatar"><i class="fa-solid fa-headset"></i></div>
        <div class="bubble">
          به بخش پشتیبانی قَبَس خوش آمدید.<br>
          تیم پشتیبانی قَبَس آماده پاسخگویی به سوالات شما در زمینه محتوای سایت، بخش‌های مختلف و راهنمایی عمومی است.<br><br>
          <small style="color:var(--text-muted);">🤖 این سیستم به صورت هوشمند پاسخ‌های اولیه را توسط Ai ارائه می‌دهد و ممکن است اشتباه کند.</small>
        </div>
      </div>
    </div>
    <div class="typing" id="typing"><i class="fa-solid fa-circle" style="font-size:6px;"></i><i class="fa-solid fa-circle" style="font-size:6px;"></i><i class="fa-solid fa-circle" style="font-size:6px;"></i></div>
    <div class="chat-input-area">
      <input type="text" id="chatInput" placeholder="سوال خود را بپرسید..." onkeypress="if(event.key==='Enter')sendMessage()">
      <button onclick="sendMessage()" id="sendBtn"><i class="fa-solid fa-paper-plane"></i></button>
    </div>
  </div>

  <footer class="footer"><p class="footer-text"><i class="fa-solid fa-fire"></i> قَبَس — شعله‌ای از نور شهدا</p></footer>

  <script>
    // لینک جدیدی که فرستادید دقیقاً اینجا قرار گرفت
    const API_URL = 'https://script.google.com/macros/s/AKfycbzi7BMeHRhmmLqNJgr4Y3v6KaC9eq_wMC7ICNIAaXgs-FSvaIy9Xuz3Pqmg2J5p7ijdtQ/exec';

    function addMessage(text, isUser) {
      const c = document.getElementById('chatMessages');
      const d = document.createElement('div');
      d.className = 'msg ' + (isUser ? 'user' : 'bot');
      d.innerHTML = `<div class="avatar"><i class="fa-solid ${isUser ? 'fa-user' : 'fa-headset'}"></i></div><div class="bubble">${text.replace(/\n/g, '<br>')}</div>`;
      c.appendChild(d); c.scrollTop = c.scrollHeight;
    }

    function showTyping(s) { document.getElementById('typing').style.display = s ? 'block' : 'none'; }

    async function sendMessage() {
      const input = document.getElementById('chatInput'), btn = document.getElementById('sendBtn');
      const msg = input.value.trim();
      if (!msg) return;
      addMessage(msg, true); input.value = ''; btn.disabled = true; showTyping(true);
      try {
        const res = await fetch(API_URL, {
          method: 'POST',
          body: JSON.stringify({ action: 'chatSupport', message: msg })
        });
        const data = await res.json();
        showTyping(false);
        if (data.result === 'success') {
          addMessage(data.data.reply, false);
        } else {
          addMessage('⚠️ خطا در ارتباط با پشتیبانی. لطفاً دوباره تلاش کنید.', false);
        }
      } catch(e) {
        showTyping(false);
        addMessage('⚠️ خطای ارتباطی. لطفاً اتصال اینترنت خود را بررسی کنید.', false);
      } finally {
        btn.disabled = false; input.focus();
      }
    }
  </script>
</body>
</html>
