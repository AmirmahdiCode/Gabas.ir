<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>قَبَس | پروفایل</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Vazirmatn:wght@400;700;800&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --bg-header: #0a1a12; --bg-card: rgba(22, 38, 30, 0.7);
      --glass-border: rgba(201, 168, 76, 0.15); --gold: #c9a84c;
      --gold-light: #e2c87a; --text: #e8e6e0; --text-muted: #a4a098;
      --red: #e74c3c; --green: #4caf84; --orange: #ff8c00;
    }
    body {
      font-family: 'Vazirmatn', 'Segoe UI', Tahoma, sans-serif;
      background: radial-gradient(ellipse at top, #1d3528 0%, #0a1410 60%);
      color: var(--text); min-height: 100vh;
      direction: rtl; display: flex; flex-direction: column;
    }
    .header {
      background: var(--bg-header); border-bottom: 1px solid rgba(201,168,76,0.2);
      padding: 12px 20px; display: flex; align-items: center;
      justify-content: space-between; position: sticky; top: 0; z-index: 100;
    }
    .header-back { color: var(--gold); font-size: 14px; font-weight: 600; text-decoration: none; display: flex; align-items: center; gap: 4px; }
    .header-title {
      font-family: 'Vazirmatn', sans-serif; font-size: 1.3rem; font-weight: 800;
      background: linear-gradient(180deg, #f5dea3 0%, #c9a84c 50%, #8a6914 100%);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .container { max-width: 500px; margin: 0 auto; padding: 16px; flex: 1; width: 100%; }

    /* Login/Register */
    .tabs { display: flex; gap: 6px; margin-bottom: 16px; }
    .tab-btn {
      flex: 1; padding: 10px; text-align: center; font-size: 13px; font-weight: 600;
      cursor: pointer; border: 1px solid var(--glass-border); border-radius: 10px;
      background: var(--bg-card); color: var(--text-muted); font-family: inherit; transition: all 0.3s;
    }
    .tab-btn.active { background: var(--gold); color: #0a1410; border-color: var(--gold); }
    .card {
      background: var(--bg-card); backdrop-filter: blur(16px);
      border: 1px solid var(--glass-border); border-radius: 14px;
      padding: 20px; margin-bottom: 14px;
    }
    .form-group { margin-bottom: 12px; }
    .form-group label { display: block; font-size: 12px; font-weight: 600; color: var(--text-muted); margin-bottom: 4px; }
    .form-group input, .form-group textarea {
      width: 100%; padding: 10px 14px; border: 1px solid var(--glass-border);
      border-radius: 10px; font-size: 13px; background: rgba(255,255,255,0.04);
      color: var(--text); outline: none; font-family: inherit;
    }
    .form-group textarea { resize: vertical; min-height: 60px; }
    .form-group input:focus, .form-group textarea:focus { border-color: var(--gold); }
    .btn {
      width: 100%; padding: 11px; border: none; border-radius: 10px;
      font-size: 13px; font-weight: 700; cursor: pointer; font-family: inherit;
      background: var(--gold); color: #0a1410; transition: all 0.3s;
    }
    .btn:hover { box-shadow: 0 6px 20px rgba(201,168,76,0.3); }
    .btn:disabled { opacity: 0.6; cursor: not-allowed; }
    .btn-sm {
      padding: 8px 14px; font-size: 12px; border-radius: 8px;
      border: 1px solid var(--gold); background: transparent; color: var(--gold);
      cursor: pointer; font-family: inherit; font-weight: 600; transition: all 0.3s;
    }
    .btn-sm:hover { background: rgba(201,168,76,0.1); }
    .btn-sm.danger { border-color: var(--red); color: var(--red); }
    .btn-sm.danger:hover { background: rgba(231,76,60,0.1); }

    .msg { text-align: center; margin-top: 8px; font-size: 12px; display: none; padding: 8px; border-radius: 8px; }
    .msg.show { display: block; }
    .msg.success { background: rgba(76,175,132,0.15); border: 1px solid var(--green); color: var(--green); }
    .msg.error { background: rgba(255,107,107,0.15); border: 1px solid var(--red); color: var(--red); }

    /* Profile */
    .profile-header { text-align: center; margin-bottom: 16px; }
    .profile-avatar {
      width: 90px; height: 90px; border-radius: 50%; margin: 0 auto 10px;
      display: flex; align-items: center; justify-content: center;
      background: rgba(201,168,76,0.12); border: 3px solid var(--gold);
      font-size: 36px; color: var(--gold); overflow: hidden; cursor: pointer;
      transition: all 0.3s; position: relative;
    }
    .profile-avatar:hover { transform: scale(1.05); }
    .profile-avatar img { width: 100%; height: 100%; object-fit: cover; }
    .profile-avatar .edit-badge {
      position: absolute; bottom: 0; right: 0; background: var(--gold);
      color: #0a1410; width: 28px; height: 28px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 12px; border: 2px solid #0a1410;
    }
    .profile-name { font-size: 18px; font-weight: 800; color: var(--gold-light); }
    .profile-username { font-size: 12px; color: var(--text-muted); margin-top: 2px; }
    .profile-status {
      display: inline-block; font-size: 10px; padding: 3px 10px;
      border-radius: 20px; margin-top: 6px;
    }
    .profile-status.online { background: rgba(76,175,132,0.2); color: var(--green); }
    .profile-status.offline { background: rgba(255,255,255,0.05); color: var(--text-muted); }

    .profile-bio { font-size: 13px; color: var(--text); margin-top: 8px; line-height: 1.7; padding: 8px 12px; background: rgba(255,255,255,0.03); border-radius: 8px; }
    .profile-interests { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 10px; justify-content: center; }
    .interest-tag { font-size: 10px; padding: 4px 12px; background: rgba(201,168,76,0.15); border: 1px solid rgba(201,168,76,0.2); border-radius: 20px; color: var(--gold-light); }

    .profile-meta { display: flex; justify-content: center; gap: 20px; margin-top: 12px; flex-wrap: wrap; }
    .meta-item { font-size: 11px; color: var(--text-muted); display: flex; align-items: center; gap: 4px; }

    .profile-actions { display: flex; gap: 8px; margin-top: 14px; flex-wrap: wrap; }
    .profile-actions .btn-sm { flex: 1; min-width: 80px; text-align: center; }

    .footer { background: var(--bg-header); border-top: 1px solid rgba(201,168,76,0.2); text-align: center; padding: 12px; margin-top: auto; }
    .footer-text { font-size: 10px; color: var(--text-muted); }

    @media (max-width: 400px) { .container { padding: 12px 8px; } .profile-actions .btn-sm { flex: 1 1 100%; } }
  </style>
</head>
<body>

  <header class="header">
    <a href="../index.html" class="header-back"><i class="fa-solid fa-arrow-right"></i> بازگشت</a>
    <div class="header-title">پروفایل</div>
    <div style="width:60px;"></div>
  </header>

  <div class="container">

    <!-- AUTH SECTION -->
    <div id="authSection">
      <div class="tabs">
        <button class="tab-btn active" onclick="switchAuthTab('login')">ورود</button>
        <button class="tab-btn" onclick="switchAuthTab('register')">ثبت‌نام</button>
      </div>

      <div class="card" id="loginForm">
        <form onsubmit="handleLogin(event)">
          <div class="form-group"><label><i class="fa-solid fa-user"></i> نام کاربری</label><input type="text" id="loginUsername" required></div>
          <div class="form-group"><label><i class="fa-solid fa-lock"></i> رمز عبور</label>
            <div style="display:flex;align-items:center;gap:6px;">
              <input type="password" id="loginPassword" required style="flex:1;">
              <span onclick="togglePassword('loginPassword')" style="cursor:pointer;color:var(--text-muted);font-size:14px;"><i class="fa-solid fa-eye"></i></span>
            </div>
          </div>
          <div class="msg" id="loginMsg"></div>
          <button type="submit" class="btn" id="loginBtn"><i class="fa-solid fa-right-to-bracket"></i> ورود</button>
        </form>
      </div>

      <div class="card" id="registerForm" style="display:none;">
        <form onsubmit="handleRegister(event)">
          <div class="form-group"><label><i class="fa-solid fa-user"></i> نام و نام خانوادگی</label><input type="text" id="regName" required></div>
          <div class="form-group"><label><i class="fa-solid fa-at"></i> نام کاربری</label><input type="text" id="regUsername" required></div>
          <div class="form-group"><label><i class="fa-solid fa-lock"></i> رمز عبور</label>
            <div style="display:flex;align-items:center;gap:6px;">
              <input type="password" id="regPassword" required minlength="4" style="flex:1;">
              <span onclick="togglePassword('regPassword')" style="cursor:pointer;color:var(--text-muted);font-size:14px;"><i class="fa-solid fa-eye"></i></span>
            </div>
          </div>
          <div class="form-group"><label><i class="fa-solid fa-cake-candles"></i> تاریخ تولد</label><input type="text" id="regBirth" placeholder="مثلاً ۱۳۸۰/۰۵/۱۲"></div>
          <div class="form-group"><label><i class="fa-solid fa-tag"></i> علاقه‌مندی‌ها</label><input type="text" id="regInterests" placeholder="شعر، مداحی، تاریخ..."></div>
          <div class="msg" id="regMsg"></div>
          <button type="submit" class="btn" id="regBtn"><i class="fa-solid fa-user-plus"></i> ثبت‌نام</button>
        </form>
      </div>
    </div>

    <!-- PROFILE SECTION -->
    <div id="profileSection" style="display:none;">
      <div class="card">
        <div class="profile-header">
          <div class="profile-avatar" id="profileAvatar" onclick="triggerAvatarUpload()">
            <i class="fa-solid fa-user"></i>
            <span class="edit-badge"><i class="fa-solid fa-camera"></i></span>
          </div>
          <input type="file" id="avatarInput" accept="image/*" style="display:none;" onchange="handleAvatarUpload(event)">
          <div class="profile-name" id="profileName">---</div>
          <div class="profile-username" id="profileUsername">@---</div>
          <span class="profile-status" id="profileStatus"></span>
          <div class="profile-bio" id="profileBio"></div>
          <div class="profile-interests" id="profileInterests"></div>
          <div class="profile-meta">
            <span class="meta-item" id="profileBirth"><i class="fa-solid fa-cake-candles"></i> ---</span>
            <span class="meta-item" id="profileFriends"><i class="fa-solid fa-users"></i> 0 دوست</span>
            <span class="meta-item" id="profileLastSeen"><i class="fa-solid fa-clock"></i> ---</span>
          </div>
        </div>
        <div class="profile-actions">
          <button class="btn-sm" onclick="showEditProfile()"><i class="fa-solid fa-pen"></i> ویرایش</button>
          <button class="btn-sm" onclick="logout()"><i class="fa-solid fa-right-from-bracket"></i> خروج</button>
        </div>
      </div>

      <!-- Edit Profile Modal -->
      <div class="card" id="editProfileCard" style="display:none;">
        <h3 style="color:var(--gold);text-align:center;font-size:14px;margin-bottom:12px;"><i class="fa-solid fa-pen"></i> ویرایش پروفایل</h3>
        <form onsubmit="handleEditProfile(event)">
          <div class="form-group"><label>نام و نام خانوادگی</label><input type="text" id="editName"></div>
          <div class="form-group"><label>بیوگرافی</label><textarea id="editBio" rows="2"></textarea></div>
          <div class="form-group"><label>علاقه‌مندی‌ها</label><input type="text" id="editInterests" placeholder="با کاما جدا کن"></div>
          <div class="form-group"><label>تاریخ تولد</label><input type="text" id="editBirth"></div>
          <div class="form-group"><label>رمز عبور جدید (اختیاری)</label>
            <div style="display:flex;align-items:center;gap:6px;">
              <input type="password" id="editPassword" placeholder="برای تغییر وارد کن" style="flex:1;">
              <span onclick="togglePassword('editPassword')" style="cursor:pointer;color:var(--text-muted);font-size:14px;"><i class="fa-solid fa-eye"></i></span>
            </div>
          </div>
          <div class="msg" id="editMsg"></div>
          <div style="display:flex;gap:8px;margin-top:8px;">
            <button type="submit" class="btn-sm" style="flex:1;"><i class="fa-solid fa-save"></i> ذخیره</button>
            <button type="button" class="btn-sm danger" onclick="closeEditProfile()"><i class="fa-solid fa-times"></i> لغو</button>
          </div>
        </form>
      </div>
    </div>

  </div>

  <footer class="footer"><p class="footer-text"><i class="fa-solid fa-fire"></i> قَبَس — شعله‌ای از نور شهدا</p></footer>

  <script>

        // ==================== API ====================
    var API_URL = 'https://script.google.com/macros/s/AKfycbx6Eh-tM-FWt8wNx798RWGaM7BZ7JFfycwpi4mFPfoNti_rpY6DIyF_7OwPygbWxX05-g/exec';
    var currentUser = null;

    // ==================== Auth ====================
    window.addEventListener('DOMContentLoaded', function() {
      var saved = localStorage.getItem('qabas_user');
      if (saved) { try { currentUser = JSON.parse(saved); showProfile(); } catch(e) {} }
    });

    function switchAuthTab(tab) {
      document.querySelectorAll('.tab-btn').forEach(function(b) { b.classList.remove('active'); });
      document.getElementById('loginForm').style.display = tab === 'login' ? 'block' : 'none';
      document.getElementById('registerForm').style.display = tab === 'register' ? 'block' : 'none';
      if (tab === 'login') document.querySelector('.tab-btn:first-child').classList.add('active');
      else document.querySelector('.tab-btn:last-child').classList.add('active');
    }

    function togglePassword(id) {
      var input = document.getElementById(id);
      var icon = input.parentElement.querySelector('span i');
      if (input.type === 'password') { input.type = 'text'; icon.className = 'fa-solid fa-eye-slash'; }
      else { input.type = 'password'; icon.className = 'fa-solid fa-eye'; }
    }

    function showMsg(el, text, type) {
      el.innerHTML = text; el.className = 'msg show ' + type;
      setTimeout(function() { el.classList.remove('show'); }, 3000);
    }

    // ==================== Login ====================
    async function handleLogin(e) {
      e.preventDefault();
      var u = document.getElementById('loginUsername').value.trim();
      var p = document.getElementById('loginPassword').value;
      var msg = document.getElementById('loginMsg');
      var btn = document.getElementById('loginBtn');
      msg.style.display = 'none'; btn.disabled = true; btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i>';

      try {
        var res = await fetch(API_URL, { method:'POST', body: JSON.stringify({ action:'login', username: u, password: p }) });
        var d = await res.json();
        if (d.status === 'success') {
          currentUser = d.data;
          localStorage.setItem('qabas_user', JSON.stringify(currentUser));
          showProfile();
        } else { showMsg(msg, d.message || 'خطا', 'error'); }
      } catch(e) { showMsg(msg, 'خطا در ارتباط', 'error'); }
      finally { btn.disabled = false; btn.innerHTML = '<i class="fa-solid fa-right-to-bracket"></i> ورود'; }
    }

    // ==================== Register ====================
    async function handleRegister(e) {
      e.preventDefault();
      var n = document.getElementById('regName').value.trim();
      var u = document.getElementById('regUsername').value.trim();
      var p = document.getElementById('regPassword').value;
      var b = document.getElementById('regBirth').value.trim();
      var i = document.getElementById('regInterests').value.trim();
      var msg = document.getElementById('regMsg');
      var btn = document.getElementById('regBtn');
      msg.style.display = 'none'; btn.disabled = true; btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i>';

      if (p.length < 4) { showMsg(msg, 'رمز عبور باید حداقل ۴ کاراکتر باشد', 'error'); btn.disabled = false; btn.innerHTML = '<i class="fa-solid fa-user-plus"></i> ثبت‌نام'; return; }

      try {
        var res = await fetch(API_URL, { method:'POST', body: JSON.stringify({ action:'register', username: u, password: p, name: n, birth_date: b, interests: i }) });
        var d = await res.json();
        if (d.status === 'success') {
          showMsg(msg, 'ثبت‌نام موفق! حالا وارد شوید.', 'success');
          document.getElementById('regName').value = '';
          document.getElementById('regUsername').value = '';
          document.getElementById('regPassword').value = '';
          document.getElementById('regBirth').value = '';
          document.getElementById('regInterests').value = '';
          setTimeout(function() { switchAuthTab('login'); }, 1500);
        } else { showMsg(msg, d.message || 'خطا', 'error'); }
      } catch(e) { showMsg(msg, 'خطا در ارتباط', 'error'); }
      finally { btn.disabled = false; btn.innerHTML = '<i class="fa-solid fa-user-plus"></i> ثبت‌نام'; }
    }

    // ==================== Show Profile ====================
    function showProfile() {
      if (!currentUser) return;
      document.getElementById('authSection').style.display = 'none';
      document.getElementById('profileSection').style.display = 'block';
      document.getElementById('profileName').textContent = currentUser.name || currentUser.username;
      document.getElementById('profileUsername').textContent = '@' + currentUser.username;

      // Avatar
      var avatar = document.getElementById('profileAvatar');
      if (currentUser.avatar) {
        avatar.innerHTML = '<img src="' + currentUser.avatar + '" alt=""><span class="edit-badge"><i class="fa-solid fa-camera"></i></span>';
      } else {
        avatar.innerHTML = '<i class="fa-solid fa-user"></i><span class="edit-badge"><i class="fa-solid fa-camera"></i></span>';
      }

      // Bio
      document.getElementById('profileBio').textContent = currentUser.bio || '';

      // Interests
      var interests = document.getElementById('profileInterests');
      if (currentUser.interests) {
        var tags = currentUser.interests.split(',').filter(function(t) { return t.trim(); });
        if (tags.length > 0) {
          var html = '';
          for (var i = 0; i < tags.length; i++) {
            html += '<span class="interest-tag">' + tags[i].trim() + '</span>';
          }
          interests.innerHTML = html;
        } else { interests.innerHTML = ''; }
      } else { interests.innerHTML = ''; }

      // Birth
      document.getElementById('profileBirth').innerHTML = currentUser.birth_date ? '<i class="fa-solid fa-cake-candles"></i> ' + currentUser.birth_date : '';

      // Friends count
      var friendCount = 0;
      if (currentUser.friends) {
        friendCount = currentUser.friends.split(',').filter(function(f) { return f.trim(); }).length;
      }
      document.getElementById('profileFriends').innerHTML = '<i class="fa-solid fa-users"></i> ' + friendCount + ' دوست';

      // Online Status
      var statusEl = document.getElementById('profileStatus');
      if (currentUser.online_status === 'online') {
        statusEl.textContent = 'آنلاین';
        statusEl.className = 'profile-status online';
      } else {
        statusEl.textContent = 'آخرین بازدید: ' + (currentUser.last_seen || 'نامشخص');
        statusEl.className = 'profile-status offline';
      }
      document.getElementById('profileLastSeen').innerHTML = '<i class="fa-solid fa-clock"></i> ' + (currentUser.last_seen || '---');

      // Update edit form fields
      document.getElementById('editName').value = currentUser.name || '';
      document.getElementById('editBio').value = currentUser.bio || '';
      document.getElementById('editInterests').value = currentUser.interests || '';
      document.getElementById('editBirth').value = currentUser.birth_date || '';
      document.getElementById('editPassword').value = '';
    }

    // ==================== Edit Profile ====================
    function showEditProfile() {
      document.getElementById('editProfileCard').style.display = 'block';
      document.getElementById('editProfileCard').scrollIntoView({ behavior: 'smooth' });
    }

    function closeEditProfile() {
      document.getElementById('editProfileCard').style.display = 'none';
    }

    async function handleEditProfile(e) {
      e.preventDefault();
      var msg = document.getElementById('editMsg');
      msg.style.display = 'none';

      var updates = {
        action: 'update_profile',
        username: currentUser.username,
        name: document.getElementById('editName').value.trim(),
        bio: document.getElementById('editBio').value.trim(),
        interests: document.getElementById('editInterests').value.trim(),
        birth_date: document.getElementById('editBirth').value.trim()
      };
      var newPass = document.getElementById('editPassword').value.trim();
      if (newPass) { updates.password = newPass; }

      try {
        var res = await fetch(API_URL, { method:'POST', body: JSON.stringify(updates) });
        var d = await res.json();
        if (d.status === 'success') {
          // Update local user data
          currentUser = d.data;
          localStorage.setItem('qabas_user', JSON.stringify(currentUser));
          showProfile();
          closeEditProfile();
          showMsg(msg, 'پروفایل با موفقیت بروز شد', 'success');
        } else { showMsg(msg, d.message || 'خطا', 'error'); }
      } catch(e) { showMsg(msg, 'خطا در ارتباط', 'error'); }
    }

    // ==================== Avatar Upload ====================
    function triggerAvatarUpload() {
      document.getElementById('avatarInput').click();
    }

    async function handleAvatarUpload(event) {
      var file = event.target.files[0];
      if (!file) return;
      var msg = document.getElementById('editMsg');
      msg.style.display = 'none';

      // Convert to base64
      var reader = new FileReader();
      reader.onload = async function(e) {
        var base64 = e.target.result;
        try {
          var res = await fetch(API_URL, { method:'POST', body: JSON.stringify({ action:'update_avatar', username: currentUser.username, avatar: base64 }) });
          var d = await res.json();
          if (d.status === 'success') {
            currentUser = d.data;
            localStorage.setItem('qabas_user', JSON.stringify(currentUser));
            showProfile();
            showMsg(msg, 'عکس پروفایل بروز شد', 'success');
          } else { showMsg(msg, d.message || 'خطا', 'error'); }
        } catch(e) { showMsg(msg, 'خطا در ارتباط', 'error'); }
      };
      reader.readAsDataURL(file);
      event.target.value = '';
    }

    // ==================== Logout ====================
    function logout() {
      localStorage.removeItem('qabas_user');
      currentUser = null;
      document.getElementById('authSection').style.display = 'block';
      document.getElementById('profileSection').style.display = 'none';
      document.getElementById('loginForm').style.display = 'block';
      document.getElementById('registerForm').style.display = 'none';
      document.querySelectorAll('.tab-btn').forEach(function(b) { b.classList.remove('active'); });
      document.querySelector('.tab-btn:first-child').classList.add('active');
    }
  </script>
</body>
</html>
