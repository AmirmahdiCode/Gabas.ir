<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>صفحه پروفایل | قَبَس</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: Tahoma, sans-serif;
      background: radial-gradient(ellipse at top, #1d3528 0%, #0a1410 60%);
      color: #e8e6e0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    .header {
      background: #0a1a12;
      border-bottom: 1px solid rgba(201,168,76,0.2);
      padding: 14px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .header a { color: #c9a84c; text-decoration: none; font-size: 14px; }
    .header-title { font-size: 1.4rem; font-weight: bold; color: #c9a84c; }
    .container { max-width: 500px; margin: 0 auto; padding: 20px; flex: 1; width: 100%; }
    .card {
      background: rgba(22, 38, 30, 0.7);
      border: 1px solid rgba(201,168,76,0.15);
      border-radius: 16px;
      padding: 25px;
      margin-bottom: 15px;
    }
    .card h3 { color: #c9a84c; margin-bottom: 15px; text-align: center; }
    .form-group { margin-bottom: 12px; }
    .form-group label { display: block; font-size: 12px; color: #a4a098; margin-bottom: 4px; }
    .form-group input, .form-group textarea {
      width: 100%;
      padding: 10px;
      border: 1px solid rgba(201,168,76,0.15);
      border-radius: 10px;
      background: rgba(255,255,255,0.04);
      color: #e8e6e0;
      font-family: Tahoma;
    }
    .form-group textarea { min-height: 60px; }
    .btn {
      width: 100%;
      padding: 11px;
      border: none;
      border-radius: 10px;
      background: #c9a84c;
      color: #0a1410;
      font-weight: bold;
      cursor: pointer;
      margin-top: 5px;
      font-size: 14px;
    }
    .btn:disabled { opacity: 0.5; }
    .btn-sm {
      padding: 8px 14px;
      border-radius: 8px;
      border: 1px solid #c9a84c;
      background: transparent;
      color: #c9a84c;
      cursor: pointer;
      text-decoration: none;
      font-size: 12px;
    }
    .msg {
      text-align: center;
      margin-top: 8px;
      font-size: 13px;
      padding: 10px;
      border-radius: 10px;
      display: none;
    }
    .msg.show { display: block; }
    .msg.success { background: rgba(76,175,132,0.15); color: #4caf84; }
    .msg.error { background: rgba(231,76,60,0.15); color: #e74c3c; }
    .msg.info { background: rgba(52,152,219,0.15); color: #3498db; }
    .tabs { display: flex; gap: 6px; margin-bottom: 16px; }
    .tab-btn {
      flex: 1;
      padding: 10px;
      text-align: center;
      border-radius: 10px;
      background: rgba(22, 38, 30, 0.7);
      border: 1px solid rgba(201,168,76,0.15);
      color: #a4a098;
      cursor: pointer;
      font-size: 13px;
    }
    .tab-btn.active { background: #c9a84c; color: #0a1410; }
    .profile-avatar {
      width: 80px; height: 80px;
      border-radius: 50%;
      margin: 0 auto 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(201,168,76,0.12);
      border: 3px solid #c9a84c;
      font-size: 32px;
      color: #c9a84c;
      overflow: hidden;
    }
    .profile-avatar img { width: 100%; height: 100%; object-fit: cover; }
    .profile-name { font-size: 20px; font-weight: bold; color: #e2c87a; text-align: center; }
    .profile-username { font-size: 13px; color: #a4a098; text-align: center; margin-bottom: 8px; }
    .profile-bio { font-size: 13px; padding: 10px; background: rgba(255,255,255,0.03); border-radius: 8px; margin: 8px 0; text-align: center; line-height: 1.8; }
    .profile-meta { display: flex; justify-content: center; gap: 20px; margin-top: 12px; font-size: 12px; color: #a4a098; }
    .profile-actions { display: flex; gap: 8px; margin-top: 14px; justify-content: center; }
    .loading { text-align: center; padding: 40px; }
    .spinner {
      width: 48px; height: 48px;
      border: 3px solid rgba(201,168,76,0.2);
      border-top-color: #c9a84c;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 16px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .error-box {
      text-align: center;
      padding: 30px;
    }
    .error-box .icon {
      font-size: 48px;
      margin-bottom: 12px;
    }
    .footer {
      background: #0a1a12;
      text-align: center;
      padding: 12px;
      font-size: 10px;
      color: #a4a098;
      margin-top: auto;
    }
  </style>
</head>
<body>
  <header class="header">
    <a href="../index.html">◀ بازگشت</a>
    <div class="header-title">پروفایل</div>
    <div></div>
  </header>

  <div class="container" id="app">
    <div class="loading">
      <div class="spinner"></div>
      <p style="color:#a4a098;">در حال بارگذاری...</p>
    </div>
  </div>

  <footer class="footer">
    <p>🔥 قَبَس — شعله‌ای از نور شهدا</p>
  </footer>

  <script>
    var API = 'https://script.google.com/macros/s/AKfycby3PO1ILwnjF54FK5BSepk6Gfdq6cXbL7kgFXAQtvIF6hHGuHZgovMvCRMyV2RpR-6cfg/exec';
    var app = document.getElementById('app');

    // ========== توابع کمکی ==========
    function showLoading(msg) {
      app.innerHTML = `
        <div class="loading">
          <div class="spinner"></div>
          <p style="color:#a4a098;">${msg || 'در حال بارگذاری...'}</p>
        </div>`;
    }

    function showError(msg) {
      app.innerHTML = `
        <div class="card error-box">
          <div class="icon">⚠️</div>
          <p style="color:#e74c3c;margin-bottom:12px;">${msg}</p>
          <button class="btn-sm" onclick="location.reload()">🔄 تلاش مجدد</button>
          <button class="btn-sm" onclick="showLoginRegister()" style="margin-right:8px;">🔐 رفتن به ورود</button>
        </div>`;
    }

    // ========== API Call ==========
    async function api(action, data) {
      data.action = action;
      try {
        var res = await fetch(API, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(data)
        });
        var text = await res.text();
        try {
          return JSON.parse(text);
        } catch(e) {
          throw new Error('پاسخ نامعتبر از سرور');
        }
      } catch(e) {
        return { status: 'error', message: 'خطا در ارتباط با سرور: ' + e.message };
      }
    }

    // ========== نمایش پروفایل ==========
    function showProfile(user) {
      var local = JSON.parse(localStorage.getItem('user') || 'null');
      var isOwner = local && local.username === user.username;
      
      app.innerHTML = `
        <div class="card">
          <div class="profile-avatar">
            ${user.avatar ? '<img src="' + user.avatar + '" onerror="this.innerHTML=\'🙂\'">' : '🙂'}
          </div>
          <div class="profile-name">${user.name || 'بی‌نام'}</div>
          <div class="profile-username">@${user.username}</div>
          ${user.bio ? '<div class="profile-bio">' + user.bio + '</div>' : ''}
          <div class="profile-meta">
            ${user.last_seen ? '<span>🕒 ' + user.last_seen + '</span>' : ''}
            ${user.birth_date ? '<span>🎂 ' + user.birth_date + '</span>' : ''}
          </div>
          <div class="profile-actions">
            <button class="btn-sm" onclick="copyLink('${user.username}')">📋 کپی لینک</button>
            ${isOwner ? '<button class="btn-sm" style="color:#e74c3c;border-color:#e74c3c;" onclick="logout()">🚪 خروج</button>' : ''}
          </div>
        </div>`;
    }

    // ========== فرم‌های ورود و ثبت‌نام ==========
    function showLoginRegister() {
      app.innerHTML = `
        <div class="tabs">
          <button id="tabLogin" class="tab-btn active" onclick="switchTab('login')">🔑 ورود</button>
          <button id="tabRegister" class="tab-btn" onclick="switchTab('register')">✨ ثبت‌نام</button>
        </div>
        <div id="loginForm" class="card">
          <h3>ورود به حساب</h3>
          <div class="form-group"><label>👤 نام کاربری</label><input id="loginUser" placeholder="نام کاربری"></div>
          <div class="form-group"><label>🔒 رمز عبور</label><input type="password" id="loginPass" placeholder="رمز عبور"></div>
          <div id="loginMsg" class="msg"></div>
          <button class="btn" id="loginBtn" onclick="doLogin()">ورود</button>
        </div>
        <div id="registerForm" class="card" style="display:none;">
          <h3>ایجاد حساب جدید</h3>
          <div class="form-group"><label>👤 نام *</label><input id="regName" placeholder="نام کامل"></div>
          <div class="form-group"><label>📧 نام کاربری *</label><input id="regUser" placeholder="نام کاربری"></div>
          <div class="form-group"><label>🔒 رمز عبور *</label><input type="password" id="regPass" placeholder="حداقل ۳ کاراکتر"></div>
          <div class="form-group"><label>📝 بیوگرافی</label><textarea id="regBio" placeholder="درباره خودت..."></textarea></div>
          <div id="regMsg" class="msg"></div>
          <button class="btn" id="regBtn" onclick="doRegister()">ثبت‌نام</button>
        </div>`;
    }

    // ========== سوییچ تب ==========
    window.switchTab = function(tab) {
      document.getElementById('tabLogin').classList.toggle('active', tab === 'login');
      document.getElementById('tabRegister').classList.toggle('active', tab === 'register');
      document.getElementById('loginForm').style.display = tab === 'login' ? 'block' : 'none';
      document.getElementById('registerForm').style.display = tab === 'register' ? 'block' : 'none';
    };

    // ========== ورود ==========
    window.doLogin = async function() {
      var u = document.getElementById('loginUser').value.trim();
      var p = document.getElementById('loginPass').value;
      var msg = document.getElementById('loginMsg');
      var btn = document.getElementById('loginBtn');
      
      msg.className = 'msg';
      
      if (!u || !p) {
        msg.className = 'msg error show';
        msg.innerHTML = '❌ لطفاً همه فیلدها را پر کنید';
        return;
      }
      
      btn.disabled = true;
      btn.textContent = '⏳ در حال ورود...';
      
      var res = await api('login', { username: u, password: p });
      
      btn.disabled = false;
      btn.textContent = 'ورود';
      
      if (res.status === 'success') {
        localStorage.setItem('user', JSON.stringify(res.data));
        msg.className = 'msg success show';
        msg.innerHTML = '✅ ورود موفق!';
        setTimeout(function() { showProfile(res.data); }, 500);
      } else {
        msg.className = 'msg error show';
        msg.innerHTML = '❌ ' + (res.message || 'خطا در ورود');
      }
    };

    // ========== ثبت‌نام ==========
    window.doRegister = async function() {
      var n = document.getElementById('regName').value.trim();
      var u = document.getElementById('regUser').value.trim();
      var p = document.getElementById('regPass').value;
      var b = document.getElementById('regBio').value.trim();
      var msg = document.getElementById('regMsg');
      var btn = document.getElementById('regBtn');
      
      msg.className = 'msg';
      
      if (!n || !u || !p) {
        msg.className = 'msg error show';
        msg.innerHTML = '❌ فیلدهای ستاره‌دار را پر کنید';
        return;
      }
      
      if (u.length < 3) {
        msg.className = 'msg error show';
        msg.innerHTML = '❌ نام کاربری حداقل ۳ کاراکتر';
        return;
      }
      
      if (p.length < 3) {
        msg.className = 'msg error show';
        msg.innerHTML = '❌ رمز عبور حداقل ۳ کاراکتر';
        return;
      }
      
      btn.disabled = true;
      btn.textContent = '⏳ در حال ثبت‌نام...';
      
      var res = await api('register', { username: u, password: p, name: n, bio: b });
      
      btn.disabled = false;
      btn.textContent = 'ثبت‌نام';
      
      if (res.status === 'success') {
        msg.className = 'msg success show';
        msg.innerHTML = '✅ ثبت‌نام موفق! به صفحه ورود بروید';
        setTimeout(function() { switchTab('login'); }, 2000);
      } else {
        msg.className = 'msg error show';
        msg.innerHTML = '❌ ' + (res.message || 'خطا در ثبت‌نام');
      }
    };

    // ========== کپی لینک ==========
    window.copyLink = function(username) {
      var link = location.origin + location.pathname + '?user=' + username;
      if (navigator.clipboard) {
        navigator.clipboard.writeText(link).then(function() {
          alert('✅ لینک کپی شد!');
        });
      } else {
        prompt('📋 لینک پروفایل:', link);
      }
    };

    // ========== خروج ==========
    window.logout = function() {
      localStorage.removeItem('user');
      location.reload();
    };

    // ========== شروع ==========
    async function init() {
      try {
        var params = new URLSearchParams(location.search);
        var viewUser = params.get('user');
        
        // حالت ۱: دیدن پروفایل دیگران
        if (viewUser) {
          showLoading('در حال دریافت پروفایل...');
          var res = await api('get_user', { username: viewUser });
          if (res.status === 'success' && res.data) {
            showProfile(res.data);
          } else {
            showError('کاربر @' + viewUser + ' پیدا نشد');
          }
          return;
        }
        
        // حالت ۲: کاربر لاگین شده
        var local = JSON.parse(localStorage.getItem('user') || 'null');
        if (local && local.username) {
          showLoading('در حال بازیابی حساب...');
          var res = await api('get_user', { username: local.username });
          if (res.status === 'success' && res.data) {
            showProfile(res.data);
            return;
          }
          // اگه کاربر حذف شده
          localStorage.removeItem('user');
        }
        
        // حالت ۳: نمایش فرم ورود
        showLoginRegister();
        
      } catch(e) {
        showError('خطا در بارگذاری: ' + e.message);
      }
    }

    // ========== timeout کلی ==========
    var timeout = setTimeout(function() {
      if (app.querySelector('.loading')) {
        showError('⏱️ بارگذاری طولانی شد');
      }
    }, 10000);

    init().then(function() {
      clearTimeout(timeout);
    });
  </script>
</body>
</html>
