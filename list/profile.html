<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>قَبَس | چت</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Vazirmatn:wght@400;700;800&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --bg-header: #0a1a12; --bg-card: rgba(22, 38, 30, 0.7);
      --glass-border: rgba(201, 168, 76, 0.15); --gold: #c9a84c;
      --gold-light: #e2c87a; --text: #e8e6e0; --text-muted: #a4a098;
      --red: #e74c3c;
    }
    body {
      font-family: 'Vazirmatn', 'Segoe UI', Tahoma, sans-serif;
      background: radial-gradient(ellipse at top, #1d3528 0%, #0a1410 60%);
      color: var(--text); min-height: 100vh;
      direction: rtl; display: flex; flex-direction: column;
    }
    .header {
      background: var(--bg-header); border-bottom: 1px solid rgba(201,168,76,0.2);
      padding: 14px 20px; display: flex; align-items: center;
      justify-content: space-between; position: sticky; top: 0; z-index: 100;
    }
    .header-back { color: var(--gold); font-size: 14px; font-weight: 600; text-decoration: none; display: flex; align-items: center; gap: 4px; }
    .header-title {
      font-family: 'Vazirmatn', sans-serif; font-size: 1.4rem; font-weight: 800;
      background: linear-gradient(180deg, #f5dea3 0%, #c9a84c 50%, #8a6914 100%);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .chat-container { max-width: 650px; margin: 0 auto; padding: 16px; flex: 1; width: 100%; display: flex; flex-direction: column; }
    .chat-messages { flex: 1; overflow-y: auto; padding: 8px 0; display: flex; flex-direction: column; gap: 12px; }

    .msg { display: flex; gap: 10px; animation: fadeIn 0.3s ease; }
    @keyframes fadeIn { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }
    .msg-avatar {
      width: 38px; height: 38px; border-radius: 50%; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      background: rgba(201,168,76,0.12); color: var(--gold);
      font-size: 15px; cursor: pointer; transition: all 0.3s;
      text-decoration: none; border: 1.5px solid rgba(201,168,76,0.2);
    }
    .msg-avatar:hover { background: rgba(201,168,76,0.25); border-color: var(--gold); }
    .msg-avatar img { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; }
    .msg-content { flex: 1; min-width: 0; }
    .msg-header { display: flex; align-items: center; gap: 8px; margin-bottom: 3px; }
    .msg-name { font-weight: 700; font-size: 12px; color: var(--gold); cursor: pointer; }
    .msg-name:hover { text-decoration: underline; }
    .msg-time { font-size: 9px; color: var(--text-muted); }
    .msg-text {
      background: var(--bg-card); backdrop-filter: blur(16px);
      border: 1px solid var(--glass-border); border-radius: 12px;
      padding: 10px 14px; font-size: 13px; line-height: 1.7; color: var(--text);
      word-break: break-word;
    }

    .test-box {
      background: rgba(52,152,219,0.15);
      border: 1px solid #3498db;
      border-radius: 10px;
      padding: 12px;
      margin-bottom: 10px;
      font-size: 12px;
      color: #3498db;
      text-align: center;
      display: none;
    }
    .test-box.show { display: block; }

    .ai-reject {
      background: rgba(255,107,107,0.08); border: 1px solid rgba(255,107,107,0.3);
      border-radius: 10px; padding: 10px 14px; margin-bottom: 8px;
      font-size: 12px; color: var(--red); display: none; text-align: center;
    }

    .chat-input-area {
      display: flex; gap: 8px; padding: 12px 0;
      background: linear-gradient(to top, rgba(10,26,18,0.95), transparent);
      position: sticky; bottom: 0;
    }
    .chat-input-area input {
      flex: 1; padding: 12px 16px; border: 1px solid var(--glass-border);
      border-radius: 24px; font-size: 13px; background: var(--bg-card);
      color: var(--text); outline: none; font-family: inherit;
    }
    .chat-input-area input:focus { border-color: var(--gold); }
    .chat-input-area button {
      width: 42px; height: 42px; border-radius: 50%; border: none;
      background: var(--gold); color: #0a1410; font-size: 16px; cursor: pointer;
      transition: all 0.3s; flex-shrink: 0; display: flex; align-items: center; justify-content: center;
    }
    .chat-input-area button:disabled { opacity: 0.5; cursor: not-allowed; }

    .login-prompt { flex: 1; display: flex; align-items: center; justify-content: center; padding: 20px; }
    .login-card {
      background: var(--bg-card); backdrop-filter: blur(16px);
      border: 1px solid var(--glass-border); border-radius: 20px;
      padding: 36px 28px; max-width: 360px; width: 100%; text-align: center;
    }
    .login-card .login-icon { font-size: 52px; color: var(--gold); margin-bottom: 12px; display: block; }
    .login-card h3 { color: var(--gold-light); font-size: 1.2rem; margin-bottom: 6px; font-weight: 700; }
    .login-card p { font-size: 0.85rem; color: var(--text-muted); margin-bottom: 24px; }
    .login-btns { display: flex; gap: 10px; }
    .btn-login, .btn-register {
      flex: 1; padding: 11px 16px; border-radius: 10px; font-weight: 600;
      font-size: 13px; cursor: pointer; font-family: inherit;
      text-decoration: none; text-align: center; transition: all 0.3s;
      display: flex; align-items: center; justify-content: center; gap: 6px;
    }
    .btn-login { background: var(--gold); color: #0a1410; }
    .btn-login:hover { box-shadow: 0 6px 20px rgba(201,168,76,0.35); }
    .btn-register { background: transparent; color: var(--gold); border: 1.5px solid var(--gold); }
    .btn-register:hover { background: rgba(201,168,76,0.08); }

    .footer { background: var(--bg-header); border-top: 1px solid rgba(201,168,76,0.2); text-align: center; padding: 16px; }
    .footer-text { font-size: 11px; color: var(--text-muted); }

    @media (max-width: 500px) { .chat-container { padding: 8px; } .msg-text { font-size: 12px; } .login-card { padding: 28px 20px; } }
  </style>
</head>
<body>

  <header class="header">
    <a href="../index.html" class="header-back"><i class="fa-solid fa-arrow-right"></i> بازگشت</a>
    <div class="header-title">قَبَس چت</div>
    <div style="width:60px;"></div>
  </header>

  <div class="chat-container" id="chatContainer">

    <div class="test-box" id="testBox"></div>

    <div class="login-prompt" id="loginPrompt">
      <div class="login-card">
        <i class="fa-solid fa-comments login-icon"></i>
        <h3>قَبَس چت</h3>
        <p>برای شرکت در گفتگو وارد حساب کاربری خود شوید</p>
        <div class="login-btns">
          <a href="profile.html" class="btn-login"><i class="fa-solid fa-right-to-bracket"></i> ورود</a>
          <a href="profile.html" class="btn-register"><i class="fa-solid fa-user-plus"></i> ثبت‌نام</a>
        </div>
      </div>
    </div>

    <div class="chat-messages" id="chatMessages" style="display:none;"></div>
    <div class="ai-reject" id="aiReject"></div>

    <div class="chat-input-area" id="chatInputArea" style="display:none;">
      <input type="text" id="chatInput" placeholder="پیام خود را بنویسید..." onkeypress="if(event.key==='Enter')sendMessage()">
      <button onclick="sendMessage()" id="sendBtn"><i class="fa-solid fa-paper-plane"></i></button>
    </div>

  </div>

  <footer class="footer"><p class="footer-text"><i class="fa-solid fa-fire"></i> قَبَس — شعله‌ای از نور شهدا</p></footer>

  <script>
    var CHAT_API = 'https://script.google.com/macros/s/AKfycbx6Eh-tM-FWt8wNx798RWGaM7BZ7JFfycwpi4mFPfoNti_rpY6DIyF_7OwPygbWxX05-g/exec';
    var USER_API = 'https://script.google.com/macros/s/AKfycbxUIo8Ig-Ff7vnSXOOe00jT6p--ObusMg-KbR33yt9UchCBHHst5_kVNmo4_uthhgeLOw/exec';
    var STORAGE_KEY = 'qabas_user';
    var currentUser = null;

    // ========== توابع localStorage ==========
    function getLocalUser() {
      return JSON.parse(localStorage.getItem(STORAGE_KEY) || 'null');
    }

    function saveLocalUser(user) {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(user));
    }

    // ========== تست ==========
    function showTest(msg) {
      var box = document.getElementById('testBox');
      box.innerHTML = '🧪 تست: ' + msg;
      box.className = 'test-box show';
    }

    // ========== آواتار ==========
    function getAvatarHtml(avatar) {
      if (!avatar) return '<i class="fa-solid fa-user"></i>';
      if (avatar.startsWith('fa-')) return '<i class="fa-solid ' + avatar + '"></i>';
      if (avatar.startsWith('http')) return '<img src="' + avatar + '" alt="">';
      return '<i class="fa-solid fa-user"></i>';
    }

    // ========== شروع ==========
    async function init() {
      // تست ۱: localStorage
      var lsData = localStorage.getItem(STORAGE_KEY);
      showTest('localStorage = ' + (lsData ? lsData.substring(0, 50) + '...' : 'null'));

      // تست ۲: getLocalUser
      currentUser = getLocalUser();
      showTest('currentUser = ' + (currentUser && currentUser.username ? currentUser.username : 'null'));

      // تست ۳: URL
      var params = new URLSearchParams(location.search);
      var userParam = params.get('user');
      showTest('URL user = ' + (userParam || 'null'));

      // اگه کاربر نبود، از URL تأیید بگیر
      if ((!currentUser || !currentUser.username) && userParam) {
        showTest('درحال تأیید از API...');
        try {
          var res = await fetch(USER_API, {
            method: 'POST',
            body: JSON.stringify({ action: 'get_user', username: userParam })
          });
          var data = await res.json();
          if (data.status === 'success' && data.data) {
            currentUser = data.data;
            saveLocalUser(currentUser);
            showTest('✅ کاربر تأیید شد: ' + currentUser.username);
          } else {
            showTest('❌ کاربر در API پیدا نشد');
          }
        } catch(e) {
          showTest('❌ خطا در اتصال به API');
        }
      }

      // تصمیم نهایی
      if (currentUser && currentUser.username) {
        showTest('✅ ورود به چت');
        showChat();
      } else {
        showTest('❌ نمایش صفحه ورود');
        document.getElementById('loginPrompt').style.display = 'flex';
        document.getElementById('chatMessages').style.display = 'none';
        document.getElementById('chatInputArea').style.display = 'none';
      }
    }

    function showChat() {
      document.getElementById('loginPrompt').style.display = 'none';
      document.getElementById('chatMessages').style.display = 'flex';
      document.getElementById('chatInputArea').style.display = 'flex';
      loadMessages();
      setInterval(loadMessages, 5000);
    }

    async function loadMessages() {
      if (!currentUser) return;
      try {
        var res = await fetch(CHAT_API, { 
          method: 'POST', 
          body: JSON.stringify({ action: 'getMessages', username: currentUser.username, friend_id: 'public' }) 
        });
        var d = await res.json();
        if (d.status === 'success' && d.data && d.data.messages) {
          var container = document.getElementById('chatMessages');
          container.innerHTML = d.data.messages.map(function(m) {
            return '<div class="msg"><a href="profile.html?user=' + (m.sender_username || '') + '" class="msg-avatar">' + getAvatarHtml(m.avatar) + '</a><div class="msg-content"><div class="msg-header"><span class="msg-name">' + (m.sender_name || 'ناشناس') + '</span><span class="msg-time">' + (m.timestamp || '') + '</span></div><div class="msg-text">' + (m.message || '') + '</div></div></div>';
          }).join('');
          container.scrollTop = container.scrollHeight;
        }
      } catch(e) {}
    }

    async function sendMessage() {
      if (!currentUser) return;
      var input = document.getElementById('chatInput');
      var msg = input.value.trim();
      if (!msg) return;

      var btn = document.getElementById('sendBtn');
      var rejectDiv = document.getElementById('aiReject');
      rejectDiv.style.display = 'none';
      btn.disabled = true;
      btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i>';

      try {
        var checkRes = await fetch(CHAT_API, { 
          method: 'POST', 
          body: JSON.stringify({ action: 'checkMessage', message: msg }) 
        });
        var checkData = await checkRes.json();

        if (checkData.status === 'success' && checkData.data && checkData.data.status === 'approved') {
          await fetch(CHAT_API, { 
            method: 'POST', 
            body: JSON.stringify({ 
              action: 'sendMessage', 
              username: currentUser.username,
              sender_name: currentUser.name || currentUser.username,
              avatar: currentUser.avatar || '',
              receiver_id: 'public', 
              message: msg 
            }) 
          });
          input.value = '';
          loadMessages();
        } else {
          rejectDiv.innerHTML = '<i class="fa-solid fa-robot"></i> ' + ((checkData.data && checkData.data.reason) || 'پیام تأیید نشد');
          rejectDiv.style.display = 'block';
        }
      } catch(e) {
        rejectDiv.innerHTML = '<i class="fa-solid fa-triangle-exclamation"></i> خطا در ارتباط';
        rejectDiv.style.display = 'block';
      } finally {
        btn.disabled = false;
        btn.innerHTML = '<i class="fa-solid fa-paper-plane"></i>';
      }
    }

    window.sendMessage = sendMessage;
    init();
  </script>
</body>
</html>
