<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>پروفایل | قَبَس</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Vazirmatn:wght@400;700;800&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --bg-header: #0a1a12; --bg-card: rgba(22, 38, 30, 0.7);
      --glass-border: rgba(201, 168, 76, 0.15); --gold: #c9a84c;
      --gold-light: #e2c87a; --text: #e8e6e0; --text-muted: #a4a098;
      --red: #e74c3c; --green: #4caf84;
    }
    body {
      font-family: 'Vazirmatn', 'Segoe UI', Tahoma, sans-serif;
      background: radial-gradient(ellipse at top, #1d3528 0%, #0a1410 60%);
      color: var(--text); min-height: 100vh;
      direction: rtl; line-height: 1.7;
      display: flex;
      flex-direction: column;
    }
    .header {
      background: var(--bg-header); border-bottom: 1px solid rgba(201,168,76,0.2);
      padding: 14px 20px; display: flex; align-items: center;
      justify-content: space-between; position: sticky; top: 0; z-index: 100;
    }
    .header-back { color: var(--gold); font-size: 14px; font-weight: 600; text-decoration: none; display: flex; align-items: center; gap: 4px; }
    .header-title {
      font-family: 'Vazirmatn', sans-serif; font-size: 1.4rem; font-weight: 800;
      background: linear-gradient(180deg, #f5dea3 0%, #c9a84c 50%, #8a6914 100%);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .container { max-width: 500px; margin: 0 auto; padding: 20px 16px; flex: 1; width: 100%; }

    .card {
      background: var(--bg-card); backdrop-filter: blur(16px);
      border: 1px solid var(--glass-border); border-radius: 16px;
      padding: 25px; margin-bottom: 15px;
    }
    .card h3 { color: var(--gold); margin-bottom: 15px; text-align: center; font-size: 1.1rem; }

    .form-group { margin-bottom: 12px; }
    .form-group label { display: block; font-size: 12px; font-weight: 600; color: var(--text-muted); margin-bottom: 4px; }
    .form-group input, .form-group textarea {
      width: 100%; padding: 10px 14px; border: 1px solid var(--glass-border);
      border-radius: 10px; font-size: 13px; background: rgba(255,255,255,0.04);
      color: var(--text); outline: none; font-family: inherit;
    }
    .form-group textarea { resize: vertical; min-height: 60px; }
    .form-group input:focus, .form-group textarea:focus { border-color: var(--gold); }

    .btn {
      width: 100%; padding: 11px; border: none; border-radius: 10px;
      font-size: 13px; font-weight: 700; cursor: pointer; font-family: inherit;
      background: var(--gold); color: #0a1410; transition: all 0.3s;
    }
    .btn:hover { box-shadow: 0 6px 20px rgba(201,168,76,0.3); }
    .btn:disabled { opacity: 0.6; cursor: not-allowed; }

    .btn-sm {
      padding: 8px 14px; font-size: 12px; border-radius: 8px;
      border: 1px solid var(--gold); background: transparent; color: var(--gold);
      cursor: pointer; font-family: inherit; font-weight: 600; transition: all 0.3s;
      display: inline-flex; align-items: center; gap: 6px;
    }
    .btn-sm:hover { background: rgba(201,168,76,0.1); }
    .btn-sm.danger { border-color: var(--red); color: var(--red); }
    .btn-sm.danger:hover { background: rgba(231,76,60,0.1); }

    .msg { text-align: center; margin-top: 8px; font-size: 12px; display: none; padding: 8px; border-radius: 8px; }
    .msg.show { display: block; }
    .msg.success { background: rgba(76,175,132,0.15); border: 1px solid var(--green); color: var(--green); }
    .msg.error { background: rgba(255,107,107,0.15); border: 1px solid var(--red); color: var(--red); }

    .tabs { display: flex; gap: 6px; margin-bottom: 16px; }
    .tab-btn {
      flex: 1; padding: 10px; text-align: center; font-size: 13px; font-weight: 600;
      cursor: pointer; border: 1px solid var(--glass-border); border-radius: 10px;
      background: var(--bg-card); color: var(--text-muted); font-family: inherit; transition: all 0.3s;
    }
    .tab-btn.active { background: var(--gold); color: #0a1410; border-color: var(--gold); }

    .profile-avatar {
      width: 100px; height: 100px; border-radius: 50%; margin: 0 auto 12px;
      display: flex; align-items: center; justify-content: center;
      background: rgba(201,168,76,0.12); border: 3px solid var(--gold);
      font-size: 40px; color: var(--gold); overflow: hidden;
    }
    .profile-avatar img { width: 100%; height: 100%; object-fit: cover; }
    .profile-name { font-size: 20px; font-weight: 800; color: var(--gold-light); text-align: center; }
    .profile-username { font-size: 13px; color: var(--text-muted); text-align: center; margin-bottom: 6px; }
    .profile-bio { font-size: 13px; color: var(--text); padding: 8px 12px; background: rgba(255,255,255,0.03); border-radius: 8px; margin: 8px 0; text-align: center; }
    .profile-meta { display: flex; justify-content: center; gap: 20px; margin-top: 12px; flex-wrap: wrap; font-size: 12px; color: var(--text-muted); }
    .profile-actions { display: flex; gap: 8px; margin-top: 14px; flex-wrap: wrap; justify-content: center; }

    .footer {
      background: var(--bg-header); border-top: 1px solid rgba(201,168,76,0.2);
      text-align: center; padding: 12px; margin-top: auto;
    }
    .footer-text { font-size: 10px; color: var(--text-muted); }

    @media (max-width: 400px) { .container { padding: 12px 8px; } }
  </style>
</head>
<body>

  <header class="header">
    <a href="../index.html" class="header-back"><i class="fa-solid fa-arrow-right"></i> بازگشت</a>
    <div class="header-title">پروفایل</div>
    <div style="width:60px;"></div>
  </header>

  <div class="container">
    <div id="profileContainer"></div>
  </div>

  <footer class="footer">
    <p class="footer-text"><i class="fa-solid fa-fire"></i> قَبَس — شعله‌ای از نور شهدا</p>
  </footer>

  <script>

        // ==================== API ====================
    var API_URL = 'https://script.google.com/macros/s/AKfycbzT4Z5kTEy_OpMPplQPIjginQ8YbbxU2qjp9gsPCPLuYgTB95gImN4s-fEGn3JrxhfkJw/exec';

    // ==================== دریافت اطلاعات ایتا ====================
    function getEitaaUser() {
      if (window.Eitaa && window.Eitaa.WebApp) {
        var user = window.Eitaa.WebApp.initDataUnsafe?.user;
        if (user) {
          return {
            id: user.id,
            username: 'et_' + user.id,
            first_name: user.first_name || '',
            last_name: user.last_name || '',
            avatar: user.photo_url || ''
          };
        }
      }
      return null;
    }

    // ==================== تابع اصلی ====================
    async function handleProfile() {
      var eitaaUser = getEitaaUser();
      var urlParams = new URLSearchParams(window.location.search);
      var viewedUser = urlParams.get('user');

      // حالت ۱: مشاهده پروفایل کاربر دیگه
      if (viewedUser) {
        showOtherProfile(viewedUser);
        return;
      }

      // حالت ۲: کاربر در ایتا هست
      if (eitaaUser) {
        var existingUser = await checkUserExists(eitaaUser.username);
        if (existingUser) {
          showProfile(existingUser);
        } else {
          showQuickRegister(eitaaUser);
        }
        return;
      }

      // حالت ۳: مرورگر معمولی
      showLoginRegister();
    }

    // ==================== بررسی وجود کاربر ====================
    async function checkUserExists(username) {
      try {
        var res = await fetch(API_URL, {
          method: 'POST',
          body: JSON.stringify({ action: 'get_user', username: username })
        });
        var data = await res.json();
        return data.status === 'success' ? data.data : null;
      } catch(e) {
        return null;
      }
    }

    // ==================== ثبت‌نام سریع (از ایتا) ====================
    function showQuickRegister(eitaaUser) {
      var container = document.getElementById('profileContainer');
      container.innerHTML = `
        <div class="card">
          <h3><i class="fa-solid fa-user-plus"></i> تکمیل پروفایل</h3>
          <p style="text-align:center;color:var(--text-muted);font-size:13px;margin-bottom:16px;">
            خوش آمدی <strong style="color:var(--gold);">${eitaaUser.first_name || 'کاربر'}</strong>!
          </p>
          <form id="quickRegisterForm">
            <div class="form-group">
              <label>نام و نام خانوادگی</label>
              <input type="text" id="qrName" value="${eitaaUser.first_name + ' ' + (eitaaUser.last_name || '')}" required>
            </div>
            <div class="form-group">
              <label>بیوگرافی (اختیاری)</label>
              <textarea id="qrBio" rows="2" placeholder="یکم از خودت بگو..."></textarea>
            </div>
            <div class="form-group">
              <label>نام کاربری</label>
              <input type="text" id="qrUsername" value="${eitaaUser.username}" readonly style="background:rgba(255,255,255,0.03);color:var(--text-muted);">
              <small style="color:var(--text-muted);font-size:11px;">🔒 این نام کاربری از ایتا گرفته شده</small>
            </div>
            <button type="submit" class="btn"><i class="fa-solid fa-check"></i> ثبت و ادامه</button>
          </form>
          <div id="qrMsg" class="msg"></div>
        </div>
      `;

      document.getElementById('quickRegisterForm').addEventListener('submit', async function(e) {
        e.preventDefault();
        var name = document.getElementById('qrName').value.trim();
        var bio = document.getElementById('qrBio').value.trim();
        var username = document.getElementById('qrUsername').value.trim();
        var msg = document.getElementById('qrMsg');

        if (!name) {
          msg.innerHTML = 'لطفاً نام خود را وارد کنید';
          msg.className = 'msg show error';
          return;
        }

        try {
          var res = await fetch(API_URL, {
            method: 'POST',
            body: JSON.stringify({
              action: 'register',
              username: username,
              password: 'eitaa_' + eitaaUser.id,
              name: name,
              bio: bio,
              avatar: eitaaUser.avatar || ''
            })
          });
          var data = await res.json();
          if (data.status === 'success') {
            localStorage.setItem('qabas_user', JSON.stringify(data.data));
            msg.innerHTML = '✅ ثبت‌نام موفق!';
            msg.className = 'msg show success';
            setTimeout(() => { window.location.reload(); }, 1500);
          } else {
            msg.innerHTML = data.message || 'خطا در ثبت‌نام';
            msg.className = 'msg show error';
          }
        } catch(e) {
          msg.innerHTML = 'خطا در ارتباط با سرور';
          msg.className = 'msg show error';
        }
      });
    }

    // ==================== نمایش پروفایل ====================
    function showProfile(user) {
      var container = document.getElementById('profileContainer');
      var avatarHtml = user.avatar 
        ? `<img src="${user.avatar}" alt="${user.name}">` 
        : `<i class="fa-solid fa-user"></i>`;

      container.innerHTML = `
        <div class="card">
          <div class="profile-avatar">${avatarHtml}</div>
          <div class="profile-name">${user.name || user.username}</div>
          <div class="profile-username">@${user.username}</div>
          ${user.bio ? `<div class="profile-bio">${user.bio}</div>` : ''}
          <div class="profile-meta">
            <span><i class="fa-regular fa-calendar"></i> ${user.last_seen || 'مدتی پیش'}</span>
            ${user.interests ? `<span><i class="fa-solid fa-tag"></i> ${user.interests}</span>` : ''}
          </div>
          <div class="profile-actions">
            <a href="${window.location.pathname}?user=${user.username}" class="btn-sm">
              <i class="fa-solid fa-link"></i> لینک پروفایل
            </a>
            <button onclick="logout()" class="btn-sm danger">
              <i class="fa-solid fa-right-from-bracket"></i> خروج
            </button>
          </div>
        </div>
      `;
    }

    // ==================== نمایش پروفایل کاربر دیگه ====================
    async function showOtherProfile(username) {
      var container = document.getElementById('profileContainer');
      try {
        var res = await fetch(API_URL, {
          method: 'POST',
          body: JSON.stringify({ action: 'get_user', username: username })
        });
        var data = await res.json();
        if (data.status === 'success') {
          showProfile(data.data);
        } else {
          container.innerHTML = `
            <div class="card" style="text-align:center;padding:40px;">
              <i class="fa-solid fa-user-slash" style="font-size:48px;color:var(--text-muted);"></i>
              <p style="color:var(--text-muted);margin-top:12px;">کاربری با این نام پیدا نشد</p>
              <a href="${window.location.pathname}" class="btn-sm" style="margin-top:16px;">بازگشت</a>
            </div>
          `;
        }
      } catch(e) {
        container.innerHTML = `<p style="text-align:center;color:var(--red);">خطا در دریافت اطلاعات</p>`;
      }
    }

    // ==================== صفحه ورود/ثبت‌نام ====================
    function showLoginRegister() {
      var container = document.getElementById('profileContainer');
      container.innerHTML = `
        <div>
          <div class="tabs">
            <button class="tab-btn active" onclick="switchAuthTab('login')">ورود</button>
            <button class="tab-btn" onclick="switchAuthTab('register')">ثبت‌نام</button>
          </div>
          <div id="loginForm" class="card">
            <form onsubmit="handleLogin(event)">
              <div class="form-group"><label>نام کاربری</label><input type="text" id="loginUsername" required></div>
              <div class="form-group"><label>رمز عبور</label><input type="password" id="loginPassword" required></div>
              <div id="loginMsg" class="msg"></div>
              <button type="submit" class="btn"><i class="fa-solid fa-right-to-bracket"></i> ورود</button>
            </form>
          </div>
          <div id="registerForm" class="card" style="display:none;">
            <form onsubmit="handleRegister(event)">
              <div class="form-group"><label>نام و نام خانوادگی</label><input type="text" id="regName" required></div>
              <div class="form-group"><label>نام کاربری</label><input type="text" id="regUsername" required></div>
              <div class="form-group"><label>رمز عبور</label><input type="password" id="regPassword" required minlength="4"></div>
              <div class="form-group"><label>بیوگرافی (اختیاری)</label><textarea id="regBio" rows="2"></textarea></div>
              <div id="regMsg" class="msg"></div>
              <button type="submit" class="btn"><i class="fa-solid fa-user-plus"></i> ثبت‌نام</button>
            </form>
          </div>
        </div>
      `;
    }

    // ==================== توابع ورود و ثبت‌نام ====================
    window.handleLogin = async function(e) {
      e.preventDefault();
      var u = document.getElementById('loginUsername').value.trim();
      var p = document.getElementById('loginPassword').value;
      var msg = document.getElementById('loginMsg');
      try {
        var res = await fetch(API_URL, { method:'POST', body: JSON.stringify({ action:'login', username: u, password: p }) });
        var d = await res.json();
        if (d.status === 'success') {
          localStorage.setItem('qabas_user', JSON.stringify(d.data));
          window.location.reload();
        } else {
          msg.innerHTML = d.message || 'خطا';
          msg.className = 'msg show error';
        }
      } catch(e) {
        msg.innerHTML = 'خطا در ارتباط';
        msg.className = 'msg show error';
      }
    };

    window.handleRegister = async function(e) {
      e.preventDefault();
      var n = document.getElementById('regName').value.trim();
      var u = document.getElementById('regUsername').value.trim();
      var p = document.getElementById('regPassword').value;
      var b = document.getElementById('regBio').value.trim();
      var msg = document.getElementById('regMsg');
      try {
        var res = await fetch(API_URL, { method:'POST', body: JSON.stringify({ action:'register', username: u, password: p, name: n, bio: b }) });
        var d = await res.json();
        if (d.status === 'success') {
          msg.innerHTML = '✅ ثبت‌نام موفق! حالا وارد شوید.';
          msg.className = 'msg show success';
          setTimeout(() => { document.querySelector('.tab-btn:first-child').click(); }, 1500);
        } else {
          msg.innerHTML = d.message || 'خطا';
          msg.className = 'msg show error';
        }
      } catch(e) {
        msg.innerHTML = 'خطا در ارتباط';
        msg.className = 'msg show error';
      }
    };

    window.switchAuthTab = function(tab) {
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      document.getElementById('loginForm').style.display = tab === 'login' ? 'block' : 'none';
      document.getElementById('registerForm').style.display = tab === 'register' ? 'block' : 'none';
      if (tab === 'login') document.querySelector('.tab-btn:first-child').classList.add('active');
      else document.querySelector('.tab-btn:last-child').classList.add('active');
    };

    window.logout = function() {
      localStorage.removeItem('qabas_user');
      window.location.reload();
    };

    // ==================== شروع ====================
    document.addEventListener('DOMContentLoaded', handleProfile);
  </script>
</body>
</html>
