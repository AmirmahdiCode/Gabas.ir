<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>قَبَس | رادیو</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Vazirmatn:wght@400;700;800&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --bg-header: #0a1a12; --bg-card: rgba(22, 38, 30, 0.7);
      --glass-border: rgba(201, 168, 76, 0.15); --gold: #c9a84c;
      --gold-light: #e2c87a; --text: #e8e6e0; --text-muted: #a4a098;
      --red: #e74c3c;
    }
    body {
      font-family: 'Vazirmatn', 'Segoe UI', Tahoma, sans-serif;
      background: radial-gradient(ellipse at top, #1d3528 0%, #0a1410 60%);
      color: var(--text); min-height: 100vh;
      direction: rtl; overflow-x: hidden;
    }
    .header {
      background: var(--bg-header); border-bottom: 1px solid rgba(201,168,76,0.2);
      padding: 14px 20px; display: flex; align-items: center;
      justify-content: space-between; position: sticky; top: 0; z-index: 100;
    }
    .header-back { color: var(--gold); font-size: 14px; font-weight: 600; text-decoration: none; display: flex; align-items: center; gap: 4px; }
    .header-title {
      font-family: 'Vazirmatn', sans-serif; font-size: 1.4rem; font-weight: 800;
      background: linear-gradient(180deg, #f5dea3 0%, #c9a84c 50%, #8a6914 100%);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .container { max-width: 500px; margin: 0 auto; padding: 20px 16px; }

    .player {
      background: var(--bg-card); backdrop-filter: blur(16px);
      border: 1px solid var(--glass-border); border-radius: 20px;
      padding: 30px 25px; margin-bottom: 20px;
    }
    .cover {
      width: 180px; height: 180px; margin: 0 auto 25px; border-radius: 50%;
      background: linear-gradient(135deg, #1a3a2a, #2a1a3a); padding: 5px;
      box-shadow: 0 0 30px rgba(201,168,76,0.3), inset 0 0 20px rgba(0,0,0,0.5);
      animation: rotate 20s linear infinite paused;
    }
    .cover.playing { animation-play-state: running; }
    @keyframes rotate { from{transform:rotate(0deg)} to{transform:rotate(360deg)} }
    .cover-inner {
      width: 100%; height: 100%; border-radius: 50%;
      background: linear-gradient(135deg, #0d1f15, #1a0d1f);
      display: flex; align-items: center; justify-content: center;
      border: 3px solid var(--gold); overflow: hidden;
    }
    .cover-icon { font-size: 60px; color: var(--gold); opacity: 0.8; }

    .info { text-align: center; margin-bottom: 20px; }
    .track-title { font-size: 1.2rem; color: var(--gold-light); margin-bottom: 4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .track-artist { color: var(--text-muted); font-size: 0.9rem; }

    .progress-container { display: flex; align-items: center; gap: 10px; margin-bottom: 25px; }
    .time { font-size: 0.8rem; color: var(--text-muted); min-width: 40px; text-align: center; }
    .progress-bar { flex: 1; height: 6px; background: rgba(255,255,255,0.1); border-radius: 3px; cursor: pointer; position: relative; }
    .progress { height: 100%; background: linear-gradient(90deg, var(--gold), #f0d78c); border-radius: 3px; width: 0%; }

    .controls { display: flex; justify-content: center; align-items: center; gap: 25px; margin-bottom: 20px; }
    .btn-ctrl { background: none; border: none; color: var(--text); font-size: 1.4rem; cursor: pointer; transition: all 0.3s; width: 45px; height: 45px; border-radius: 50%; display: flex; align-items: center; justify-content: center; }
    .btn-ctrl:hover { color: var(--gold); background: rgba(201,168,76,0.1); }
    .btn-main { background: linear-gradient(135deg, var(--gold), #a6842a); color: #0a1410; font-size: 1.8rem; width: 60px; height: 60px; box-shadow: 0 5px 20px rgba(201,168,76,0.4); }
    .btn-main:hover { transform: scale(1.05); }

    .extra-controls { display: flex; justify-content: center; align-items: center; gap: 15px; margin-bottom: 20px; }
    .btn-small { background: none; border: 1px solid rgba(201,168,76,0.3); color: var(--text); font-size: 0.9rem; cursor: pointer; padding: 8px 12px; border-radius: 20px; transition: all 0.3s; }
    .btn-small:hover { background: rgba(201,168,76,0.1); border-color: var(--gold); }
    .btn-small.active { background: var(--gold); color: #0a1410; border-color: var(--gold); }
    .btn-like { color: var(--text-muted); font-size: 1.2rem; }
    .btn-like.liked { color: var(--red); }

    .volume-control { display: flex; align-items: center; gap: 8px; }
    .volume-icon { color: var(--gold); font-size: 0.9rem; }
    .volume-slider { -webkit-appearance: none; width: 80px; height: 4px; background: rgba(255,255,255,0.1); border-radius: 2px; outline: none; cursor: pointer; }
    .volume-slider::-webkit-slider-thumb { -webkit-appearance: none; width: 14px; height: 14px; background: var(--gold); border-radius: 50%; cursor: pointer; }

    .download-btn { display: block; text-align: center; color: var(--gold); text-decoration: none; padding: 10px; border: 1px dashed rgba(201,168,76,0.4); border-radius: 25px; font-size: 0.9rem; transition: all 0.3s; }
    .download-btn:hover { background: rgba(201,168,76,0.1); }

    .playlist {
      background: var(--bg-card); backdrop-filter: blur(16px);
      border: 1px solid var(--glass-border); border-radius: 20px;
      padding: 20px; max-height: 350px; overflow-y: auto;
    }
    .playlist-title { color: var(--gold); margin-bottom: 15px; font-size: 1.1rem; display: flex; justify-content: space-between; align-items: center; }
    .track-count { font-size: 0.8rem; color: var(--text-muted); font-weight: normal; }
    .playlist-items { list-style: none; }
    .playlist-item { display: flex; align-items: center; gap: 10px; padding: 12px 10px; border-radius: 12px; cursor: pointer; transition: all 0.3s; border: 1px solid transparent; margin-bottom: 5px; }
    .playlist-item:hover { background: rgba(201,168,76,0.05); }
    .playlist-item.active { background: rgba(201,168,76,0.15); border-color: rgba(201,168,76,0.4); }
    .item-index { width: 28px; height: 28px; border-radius: 50%; background: rgba(201,168,76,0.2); display: flex; align-items: center; justify-content: center; font-size: 0.8rem; color: var(--gold); flex-shrink: 0; }
    .playlist-item.active .item-index { background: var(--gold); color: #0a1410; }
    .item-info { flex: 1; min-width: 0; }
    .item-title { font-size: 0.95rem; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .item-artist { font-size: 0.8rem; color: var(--text-muted); }
    .search-box { margin-bottom:15px; display:flex; align-items:center; gap:8px; background:var(--bg-card); border-radius:12px; padding:10px 15px; border:1px solid var(--glass-border); }
    .search-box input { flex:1; background:none; border:none; color:var(--text); font-family:inherit; font-size:0.9rem; outline:none; }
    .category-tabs { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 15px; justify-content: center; }
    .cat-btn { padding: 8px 14px; background: rgba(255,255,255,0.03); border: 1px solid rgba(201,168,76,0.2); border-radius: 20px; color: #e0e0e0; cursor: pointer; font-size: 0.8rem; font-family: inherit; transition: all 0.3s; display: flex; align-items: center; gap: 5px; }
    .cat-btn:hover { border-color: #c9a84c; background: rgba(201,168,76,0.08); }
    .cat-btn.active { background: #c9a84c; color: #0a1410; border-color: #c9a84c; font-weight: bold; }

    .footer {
      background: var(--bg-header); border-top: 1px solid rgba(201,168,76,0.2);
      text-align: center; padding: 16px; margin-top: 20px;
    }
    .footer-text { font-size: 11px; color: var(--text-muted); }

    @media (max-width: 480px) { .cover{width:140px;height:140px} .cover-icon{font-size:45px} .controls{gap:15px} .btn-main{width:50px;height:50px;font-size:1.4rem} .player{padding:20px 15px} }
  </style>
</head>
<body>

  <header class="header">
    <a href="../index.html" class="header-back"><i class="fa-solid fa-arrow-right"></i> بازگشت</a>
    <div class="header-title">رادیو قَبَس</div>
    <div style="width:60px;"></div>
  </header>

  <div class="container">

    <div class="player">
      <div class="cover" id="coverContainer"><div class="cover-inner"><i class="fa-solid fa-mosque cover-icon"></i></div></div>
      <div class="info">
        <h2 class="track-title" id="trackTitle">در حال بارگذاری</h2>
        <p class="track-artist" id="trackArtist">—</p>
      </div>
      <div class="progress-container">
        <span class="time" id="currentTime">00:00</span>
        <div class="progress-bar" id="progressBar"><div class="progress" id="progress"></div></div>
        <span class="time" id="duration">00:00</span>
      </div>
      <div class="controls">
        <button class="btn-ctrl" id="prevBtn"><i class="fa-solid fa-forward"></i></button>
        <button class="btn-ctrl btn-main" id="playBtn"><i class="fa-solid fa-play"></i></button>
        <button class="btn-ctrl" id="nextBtn"><i class="fa-solid fa-backward"></i></button>
      </div>
      <div class="extra-controls">
        <button class="btn-small" id="shuffleBtn"><i class="fa-solid fa-random"></i></button>
        <button class="btn-small" id="repeatBtn"><i class="fa-solid fa-redo"></i></button>
        <button class="btn-small btn-like" id="likeBtn" onclick="toggleLike()"><i class="fa-solid fa-heart"></i></button>
        <div class="volume-control"><i class="fa-solid fa-volume-up volume-icon"></i><input type="range" id="volumeSlider" min="0" max="100" value="70" class="volume-slider"></div>
      </div>
      <a href="#" id="downloadLink" class="download-btn" download><i class="fa-solid fa-download"></i> دریافت فایل</a>
    </div>

    <div class="search-box">
      <i class="fa-solid fa-search" style="color:var(--gold);"></i>
      <input type="text" id="searchInput" placeholder="جستجو...">
      <i class="fa-solid fa-times" id="searchClear" style="color:var(--text-muted);cursor:pointer;display:none;" onclick="clearSearch()"></i>
    </div>

    <div class="category-tabs">
      <button class="cat-btn active" onclick="filterCategory('همه')"><i class="fa-solid fa-list"></i> همه</button>
      <button class="cat-btn" onclick="filterCategory('محرم')">محرم</button>
      <button class="cat-btn" onclick="filterCategory('حماسی')">حماسی</button>
      <button class="cat-btn" onclick="filterCategory('شور')">شور</button>
      <button class="cat-btn" onclick="filterCategory('مولودی')">مولودی</button>
      <button class="cat-btn" onclick="filterCategory('سایر')">سایر</button>
      <button class="cat-btn" onclick="filterCategory('favorites')"><i class="fa-solid fa-heart"></i> مورد علاقه</button>
    </div>

    <div class="playlist">
      <h3 class="playlist-title"><i class="fa-solid fa-list"></i> لیست پخش <span class="track-count" id="trackCount">0 مداحی</span></h3>
      <ul class="playlist-items" id="playlistItems"></ul>
    </div>

  </div>

  <footer class="footer">
    <p class="footer-text"><i class="fa-solid fa-fire"></i> قَبَس — شعله‌ای از نور شهدا</p>
  </footer>

  <audio id="audio" preload="auto"></audio>

  <script>
    var API_URL = 'https://script.google.com/macros/s/AKfycbzuhWUIJ_d0bfIctIwcsQ61ELOpYUDKLT1KU5zNci1OT4ie1g_3pd3sRZlVJJzCAXllnA/exec';
    var MADAHI_API = API_URL + '?type=madahi';
    var playlist = [];
    var filteredPlaylist = [];
    var currentTrack = null;
    var audio = document.getElementById('audio');
    var playBtn = document.getElementById('playBtn');
    var coverContainer = document.getElementById('coverContainer');
    var currentCategory = 'همه';
    var searchQuery = '';
    var currentTrackIndex = 0;
    var isPlaying = false;
    var isShuffle = false;
    var isRepeat = false;

    function getFavorites() { try { return JSON.parse(localStorage.getItem('radio_favs') || '[]'); } catch(e) { return []; } }
    function saveFavorites(favs) { localStorage.setItem('radio_favs', JSON.stringify(favs)); }
    function isFavorite(title) { return getFavorites().indexOf(title) !== -1; }
    function toggleFavorite(title) { var favs = getFavorites(); var idx = favs.indexOf(title); if (idx === -1) favs.push(title); else favs.splice(idx, 1); saveFavorites(favs); updateLikeButton(); if (currentCategory === 'favorites') { applyFilters(); buildPlaylistUI(); } }
    function toggleLike() { if (!currentTrack) return; toggleFavorite(currentTrack.title); }
    function updateLikeButton() { var btn = document.getElementById('likeBtn'); if (currentTrack && isFavorite(currentTrack.title)) { btn.classList.add('liked'); } else { btn.classList.remove('liked'); } }

    async function loadPlaylistFromAPI() {
      try { var response = await fetch(MADAHI_API); var data = await response.json(); playlist = data; applyFilters(); document.getElementById('trackCount').textContent = playlist.length + ' مداحی'; if (playlist.length > 0) loadTrack(0); else { document.getElementById('trackTitle').innerText = 'لیست خالی'; document.getElementById('trackArtist').innerText = '—'; } } catch(e) { document.getElementById('trackTitle').innerText = 'خطا در دریافت'; document.getElementById('trackArtist').innerText = '—'; }
    }

    document.getElementById('searchInput').addEventListener('input', function() { searchQuery = this.value.trim(); document.getElementById('searchClear').style.display = searchQuery ? 'block' : 'none'; currentTrackIndex = 0; applyFilters(); buildPlaylistUI(); });
    function clearSearch() { document.getElementById('searchInput').value = ''; searchQuery = ''; document.getElementById('searchClear').style.display = 'none'; applyFilters(); buildPlaylistUI(); }

    function applyFilters() { filteredPlaylist = playlist.slice(); if (currentCategory !== 'همه') { if (currentCategory === 'favorites') { var favs = getFavorites(); filteredPlaylist = filteredPlaylist.filter(function(t) { return favs.indexOf(t.title) !== -1; }); } else { filteredPlaylist = filteredPlaylist.filter(function(t) { return t.category === currentCategory; }); } } if (searchQuery) { filteredPlaylist = filteredPlaylist.filter(function(t) { return t.title.indexOf(searchQuery) !== -1 || t.artist.indexOf(searchQuery) !== -1; }); } }

    function buildPlaylistUI() {
      var container = document.getElementById('playlistItems');
      container.innerHTML = '';
      if (filteredPlaylist.length === 0) { container.innerHTML = '<li style="text-align:center;color:var(--text-muted);padding:20px;">موردی یافت نشد</li>'; return; }
      document.getElementById('trackCount').textContent = filteredPlaylist.length + ' مداحی';
      for (var i = 0; i < filteredPlaylist.length; i++) {
        (function(index) {
          var t = filteredPlaylist[index]; var liked = isFavorite(t.title);
          var li = document.createElement('li'); li.className = 'playlist-item';
          li.innerHTML = '<span class="item-index">' + (index + 1) + '</span><div class="item-info"><div class="item-title">' + t.title + '</div><div class="item-artist">' + t.artist + '</div></div><span style="margin-left:5px;font-size:0.8rem;color:var(--text-muted);">' + (t.duration || '--:--') + '</span><span class="btn-like' + (liked ? ' liked' : '') + '" onclick="event.stopPropagation(); toggleFavorite(\'' + t.title.replace(/'/g, "\\'") + '\'); buildPlaylistUI();" style="cursor:pointer;font-size:1.1rem;flex-shrink:0;"><i class="fa-solid fa-heart"></i></span>';
          li.addEventListener('click', function() { currentTrackIndex = index; loadTrack(currentTrackIndex); if (isPlaying) audio.play(); });
          container.appendChild(li);
        })(i);
      }
    }

    function loadTrack(index) {
      if (filteredPlaylist.length === 0) return;
      if (index < 0) index = filteredPlaylist.length - 1;
      if (index >= filteredPlaylist.length) index = 0;
      currentTrackIndex = index; currentTrack = filteredPlaylist[currentTrackIndex];
      document.getElementById('trackTitle').innerText = currentTrack.title;
      document.getElementById('trackArtist').innerText = currentTrack.artist;
      audio.src = currentTrack.src;
      document.getElementById('downloadLink').href = currentTrack.src;
      document.getElementById('downloadLink').setAttribute('download', currentTrack.title + '.mp3');
      document.getElementById('progress').style.width = '0%';
      document.getElementById('currentTime').innerText = '00:00';
      document.getElementById('duration').innerText = currentTrack.duration || '--:--';
      updateLikeButton(); updateActiveItem();
    }

    function updateActiveItem() { var items = document.querySelectorAll('.playlist-item'); for (var i = 0; i < items.length; i++) items[i].classList.remove('active'); if (items[currentTrackIndex]) items[currentTrackIndex].classList.add('active'); }

    playBtn.addEventListener('click', function() { if (filteredPlaylist.length === 0) return; if (isPlaying) { audio.pause(); isPlaying = false; playBtn.innerHTML = '<i class="fa-solid fa-play"></i>'; coverContainer.classList.remove('playing'); } else { audio.play(); isPlaying = true; playBtn.innerHTML = '<i class="fa-solid fa-pause"></i>'; coverContainer.classList.add('playing'); } });
    document.getElementById('nextBtn').addEventListener('click', function() { currentTrackIndex++; loadTrack(currentTrackIndex); if (isPlaying) audio.play(); });
    document.getElementById('prevBtn').addEventListener('click', function() { currentTrackIndex--; loadTrack(currentTrackIndex); if (isPlaying) audio.play(); });

    audio.addEventListener('timeupdate', function() { if (audio.duration) { document.getElementById('progress').style.width = (audio.currentTime / audio.duration) * 100 + '%'; var m = Math.floor(audio.currentTime / 60), s = Math.floor(audio.currentTime % 60); document.getElementById('currentTime').innerText = String(m).padStart(2,'0') + ':' + String(s).padStart(2,'0'); var rem = audio.duration - audio.currentTime; document.getElementById('duration').innerText = '-' + String(Math.floor(rem/60)).padStart(2,'0') + ':' + String(Math.floor(rem%60)).padStart(2,'0'); } });
    audio.addEventListener('ended', function() { if (isRepeat) { loadTrack(currentTrackIndex); audio.play(); } else { document.getElementById('nextBtn').click(); } });
    document.getElementById('volumeSlider').addEventListener('input', function() { audio.volume = this.value / 100; }); audio.volume = 0.7;
    document.getElementById('shuffleBtn').addEventListener('click', function() { isShuffle = !isShuffle; this.classList.toggle('active', isShuffle); });
    document.getElementById('repeatBtn').addEventListener('click', function() { isRepeat = !isRepeat; this.classList.toggle('active', isRepeat); });
    document.getElementById('progressBar').addEventListener('click', function(e) { var rect = this.getBoundingClientRect(); var pct = (rect.right - e.clientX) / rect.width; audio.currentTime = Math.max(0, Math.min(1, pct)) * audio.duration; });

    function filterCategory(cat) { currentCategory = cat; currentTrackIndex = 0; document.querySelectorAll('.cat-btn').forEach(function(b){ b.classList.remove('active'); }); event.target.classList.add('active'); applyFilters(); buildPlaylistUI(); if (filteredPlaylist.length > 0) loadTrack(0); }

    loadPlaylistFromAPI();
  </script>
</body>
</html>
