<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>قَبَس | چت</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Vazirmatn:wght@400;700;800&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --bg-header: #0a1a12; --bg-card: rgba(22, 38, 30, 0.7);
      --glass-border: rgba(201, 168, 76, 0.15); --gold: #c9a84c;
      --gold-light: #e2c87a; --text: #e8e6e0; --text-muted: #a4a098;
      --red: #e74c3c; --green: #4caf84;
    }
    body {
      font-family: 'Vazirmatn', 'Segoe UI', Tahoma, sans-serif;
      background: radial-gradient(ellipse at top, #1d3528 0%, #0a1410 60%);
      color: var(--text); min-height: 100vh;
      direction: rtl; display: flex; flex-direction: column;
    }
    .header {
      background: var(--bg-header); border-bottom: 1px solid rgba(201,168,76,0.2);
      padding: 14px 20px; display: flex; align-items: center;
      justify-content: space-between; position: sticky; top: 0; z-index: 100;
    }
    .header-back { color: var(--gold); font-size: 14px; font-weight: 600; text-decoration: none; display: flex; align-items: center; gap: 4px; }
    .header-title {
      font-family: 'Vazirmatn', sans-serif; font-size: 1.4rem; font-weight: 800;
      background: linear-gradient(180deg, #f5dea3 0%, #c9a84c 50%, #8a6914 100%);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .chat-container { max-width: 650px; margin: 0 auto; padding: 16px; flex: 1; width: 100%; display: flex; flex-direction: column; }
    .chat-messages { flex: 1; overflow-y: auto; padding: 8px 0; display: flex; flex-direction: column; gap: 12px; }

    .msg { display: flex; gap: 10px; animation: fadeIn 0.3s ease; }
    @keyframes fadeIn { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }
    .msg-avatar {
      width: 40px; height: 40px; border-radius: 50%; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      background: rgba(201,168,76,0.15); color: var(--gold);
      font-size: 16px; cursor: pointer; transition: all 0.3s; text-decoration: none;
    }
    .msg-avatar:hover { background: rgba(201,168,76,0.3); }
    .msg-avatar img { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; }
    .msg-content { flex: 1; }
    .msg-header { display: flex; align-items: center; gap: 8px; margin-bottom: 4px; }
    .msg-name { font-weight: 700; font-size: 13px; color: var(--gold); cursor: pointer; }
    .msg-name:hover { text-decoration: underline; }
    .msg-time { font-size: 10px; color: var(--text-muted); }
    .msg-text { background: var(--bg-card); backdrop-filter: blur(16px); border: 1px solid var(--glass-border); border-radius: 12px; padding: 12px 16px; font-size: 13px; line-height: 1.7; color: var(--text); }

    .ai-reject {
      background: rgba(255,107,107,0.1); border: 1px solid var(--red);
      border-radius: 12px; padding: 12px 16px; margin-bottom: 8px;
      font-size: 12px; color: var(--red); display: none;
    }

    .chat-input-area {
      display: flex; gap: 8px; padding: 12px 0;
      background: linear-gradient(to top, rgba(10,26,18,0.95), transparent);
      position: sticky; bottom: 0;
    }
    .chat-input-area input {
      flex: 1; padding: 12px 16px; border: 1px solid var(--glass-border);
      border-radius: 24px; font-size: 13px; background: var(--bg-card);
      color: var(--text); outline: none; font-family: inherit;
    }
    .chat-input-area input:focus { border-color: var(--gold); }
    .chat-input-area button {
      width: 44px; height: 44px; border-radius: 50%; border: none;
      background: var(--gold); color: #0a1410; font-size: 18px; cursor: pointer;
      transition: all 0.3s; flex-shrink: 0;
    }
    .chat-input-area button:disabled { opacity: 0.5; cursor: not-allowed; }

    .login-prompt { text-align: center; padding: 40px 20px; color: var(--text-muted); flex: 1; display: flex; align-items: center; justify-content: center; }
    .login-card { background: var(--bg-card); backdrop-filter: blur(16px); border: 1px solid var(--glass-border); border-radius: 20px; padding: 40px 30px; max-width: 380px; width: 100%; }
    .login-card i { font-size: 56px; color: var(--gold); margin-bottom: 16px; display: block; }
    .login-card h3 { color: var(--gold-light); font-size: 1.3rem; margin-bottom: 8px; }
    .login-card p { font-size: 0.9rem; margin-bottom: 24px; }
    .login-btns { display: flex; gap: 10px; }
    .btn-login, .btn-register {
      flex: 1; padding: 12px; border-radius: 10px; font-weight: bold; font-size: 14px;
      cursor: pointer; font-family: inherit; text-decoration: none; text-align: center;
      transition: all 0.3s; display: flex; align-items: center; justify-content: center; gap: 6px;
    }
    .btn-login { background: var(--gold); color: #0a1410; }
    .btn-login:hover { box-shadow: 0 8px 25px rgba(201,168,76,0.4); }
    .btn-register { background: transparent; color: var(--gold); border: 2px solid var(--gold); }
    .btn-register:hover { background: rgba(201,168,76,0.1); }

    .footer { background: var(--bg-header); border-top: 1px solid rgba(201,168,76,0.2); text-align: center; padding: 16px; }
    .footer-text { font-size: 11px; color: var(--text-muted); }

    @media (max-width: 500px) { .chat-container { padding: 8px; } .msg-text { font-size: 12px; } }
  </style>
</head>
<body>

  <header class="header">
    <a href="../index.html" class="header-back"><i class="fa-solid fa-arrow-right"></i> بازگشت</a>
    <div class="header-title">قَبَس چت</div>
    <div style="width:60px;"></div>
  </header>

  <div class="chat-container" id="chatContainer">

    <div class="login-prompt" id="loginPrompt">
      <div class="login-card">
        <i class="fa-solid fa-comments"></i>
        <h3>قَبَس چت</h3>
        <p>برای شرکت در گفتگو باید وارد حساب کاربری خود شوید</p>
        <div class="login-btns">
          <a href="profile.html" class="btn-login"><i class="fa-solid fa-right-to-bracket"></i> ورود</a>
          <a href="profile.html" class="btn-register"><i class="fa-solid fa-user-plus"></i> ثبت‌نام</a>
        </div>
      </div>
    </div>

    <div class="chat-messages" id="chatMessages" style="display:none;"></div>
    <div class="ai-reject" id="aiReject"></div>
    <div class="chat-input-area" id="chatInputArea" style="display:none;">
      <input type="text" id="chatInput" placeholder="پیام خود را بنویسید..." onkeypress="if(event.key==='Enter')sendMessage()">
      <button onclick="sendMessage()" id="sendBtn"><i class="fa-solid fa-paper-plane"></i></button>
    </div>
  </div>

  <footer class="footer"><p class="footer-text"><i class="fa-solid fa-fire"></i> قَبَس — شعله‌ای از نور شهدا</p></footer>

  <script>
    var API_URL = 'https://script.google.com/macros/s/AKfycbx6Eh-tM-FWt8wNx798RWGaM7BZ7JFfycwpi4mFPfoNti_rpY6DIyF_7OwPygbWxX05-g/exec';
    var currentUser = null;

    window.addEventListener('DOMContentLoaded', function() {
      var saved = localStorage.getItem('qabas_user');
      if (saved) { try { currentUser = JSON.parse(saved); showChat(); } catch(e) {} }
    });

    function showChat() {
      if (!currentUser) return;
      document.getElementById('loginPrompt').style.display = 'none';
      document.getElementById('chatMessages').style.display = 'flex';
      document.getElementById('chatInputArea').style.display = 'flex';
      loadMessages();
      setInterval(loadMessages, 5000);
    }

    async function loadMessages() {
      try {
        var res = await fetch(API_URL, { method:'POST', body: JSON.stringify({ action:'getMessages', user_id: currentUser.user_id, friend_id: 'public' }) });
        var d = await res.json();
        if (d.status === 'success' && d.data.messages) {
          var container = document.getElementById('chatMessages');
          container.innerHTML = d.data.messages.map(function(m) {
            return '<div class="msg">' +
              '<a href="members.html" class="msg-avatar" onclick="localStorage.setItem(\'qabas_member\',\'' + m.sender_id + '\')">' +
                (m.avatar ? '<img src="' + m.avatar + '" alt="">' : '<i class="fa-solid fa-user"></i>') +
              '</a>' +
              '<div class="msg-content">' +
                '<div class="msg-header">' +
                  '<span class="msg-name" onclick="localStorage.setItem(\'qabas_member\',\'' + m.sender_id + '\');window.location.href=\'members.html\'">' + (m.sender_name || 'ناشناس') + '</span>' +
                  '<span class="msg-time">' + (m.timestamp || '') + '</span>' +
                '</div>' +
                '<div class="msg-text">' + (m.message || '') + '</div>' +
              '</div></div>';
          }).join('');
          container.scrollTop = container.scrollHeight;
        }
      } catch(e) {}
    }

    async function sendMessage() {
      var input = document.getElementById('chatInput');
      var msg = input.value.trim();
      if (!msg || !currentUser) return;

      var btn = document.getElementById('sendBtn');
      var rejectDiv = document.getElementById('aiReject');
      rejectDiv.style.display = 'none';
      btn.disabled = true; btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i>';

      try {
        var checkRes = await fetch(API_URL, { method:'POST', body: JSON.stringify({ action:'checkMessage', message: msg }) });
        var checkData = await checkRes.json();

        if (checkData.status === 'success' && checkData.data.status === 'approved') {
          await fetch(API_URL, { method:'POST', body: JSON.stringify({ action:'sendMessage', sender_id: currentUser.user_id, receiver_id: 'public', message: msg }) });
          input.value = '';
          loadMessages();
        } else {
          rejectDiv.innerHTML = '<i class="fa-solid fa-robot"></i> پیام شما تأیید نشد: ' + (checkData.data?.reason || 'لطفاً بازنویسی کنید');
          rejectDiv.style.display = 'block';
        }
      } catch(e) {
        rejectDiv.innerHTML = '<i class="fa-solid fa-triangle-exclamation"></i> خطا در بررسی پیام';
        rejectDiv.style.display = 'block';
      } finally {
        btn.disabled = false; btn.innerHTML = '<i class="fa-solid fa-paper-plane"></i>';
      }
    }
  </script>
</body>
</html>
